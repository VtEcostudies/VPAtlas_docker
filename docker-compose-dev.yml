#
# VPAtlas Docker Compose — dev.vpatlas.org
#
# Override for remote dev deployment.
# Usage: docker compose -f docker-compose-vpatlas.yml -f docker-compose-dev.yml up -d
#
# Port Scheme (same internal, different external to avoid conflicts):
#   db=6550, api=4010, ui=8090
#

services:
  api_vp:
    environment:
      # API is proxied through nginx — no port in URL
      API_PROT: https
      API_HOST: api.dev.vpatlas.org
      API_PORT: 4010

      # UI host (for CORS)
      UI_PROT: https
      UI_HOST: dev.vpatlas.org
      UI_PORT: 80

  ui_vp:
    environment:
      # API connection — proxied through nginx
      API_PROT: https
      API_HOST: api.dev.vpatlas.org
      API_PORT: 443

      # UI host
      UI_PROT: https
      UI_HOST: dev.vpatlas.org
      UI_PORT: 443
