# dev.vpatlas.org — UI reverse proxy
# Install: sudo cp deploy/nginx-dev.vpatlas.org.conf /etc/nginx/sites-available/dev.vpatlas.org
#          sudo ln -sf /etc/nginx/sites-available/dev.vpatlas.org /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d dev.vpatlas.org
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name dev.vpatlas.org;
    # certbot will add redirect to 443
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dev.vpatlas.org;

    # certbot will fill these in:
    # ssl_certificate /etc/letsencrypt/live/dev.vpatlas.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dev.vpatlas.org/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
