# api.dev.vpatlas.org — API reverse proxy
# After installing, run: sudo certbot --nginx -d api.dev.vpatlas.org
# Certbot will add the SSL block and redirect automatically.

server {
    listen 80;
    server_name api.dev.vpatlas.org;

    # CORS headers — allow dev.vpatlas.org
    add_header Access-Control-Allow-Origin "https://dev.vpatlas.org" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    add_header Access-Control-Allow-Credentials "true" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location / {
        proxy_pass http://127.0.0.1:4010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
