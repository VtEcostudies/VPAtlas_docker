# api.dev.vpatlas.org — API reverse proxy
# Install: sudo cp deploy/nginx-api.dev.vpatlas.org.conf /etc/nginx/sites-available/api.dev.vpatlas.org
#          sudo ln -sf /etc/nginx/sites-available/api.dev.vpatlas.org /etc/nginx/sites-enabled/
#          sudo certbot --nginx -d api.dev.vpatlas.org
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name api.dev.vpatlas.org;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.dev.vpatlas.org;

    # certbot will fill these in:
    # ssl_certificate /etc/letsencrypt/live/api.dev.vpatlas.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.dev.vpatlas.org/privkey.pem;

    # CORS headers — allow dev.vpatlas.org
    add_header Access-Control-Allow-Origin "https://dev.vpatlas.org" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    location / {
        proxy_pass http://127.0.0.1:4010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
