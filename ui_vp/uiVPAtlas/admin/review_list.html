<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPAtlas - Reviews</title>
    <link rel="stylesheet" href="/css/bootstrap_5.2.3.min.css">
    <link rel="stylesheet" href="/css/font-awesome_6.6.0.all.min.css">
    <link rel="stylesheet" href="/explore/css/common.css">
    <link rel="stylesheet" href="/explore/css/modal.css">
    <link rel="stylesheet" href="/explore/css/pool_list.css">
    <link rel="stylesheet" href="/css/map.css">
</head>
<body>
    <header>
        <div class="row controls">
            <div class="px-1 col-xl-1 col-2">
                <button class="exit-button" onclick="window.location.href='/explore/'">&times;</button>
            </div>
            <div class="px-1 col-xl-3 col-4">
                <h3 class="header-name light-foreground" id="page_title">Reviews</h3>
            </div>
            <div class="px-1 col-xl-8 col-6" style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="btn_create_review" class="action-button" style="display:none; font-size:16px;">Create Review</button>
            </div>
        </div>
    </header>
    <hr class="divider-header">

    <!-- Filter Form -->
    <div class="row" style="padding:10px;">
        <div class="col-lg-2 col-md-3 col-sm-6 col-12 px-1">
            <input type="text" id="filter_reviewId" class="form-control form-control-sm" placeholder="Review ID">
        </div>
        <div class="col-lg-2 col-md-3 col-sm-6 col-12 px-1">
            <input type="text" id="filter_poolId" class="form-control form-control-sm" placeholder="Pool ID">
        </div>
        <div class="col-lg-2 col-md-3 col-sm-6 col-12 px-1">
            <input type="text" id="filter_qaPerson" class="form-control form-control-sm" placeholder="QA Person">
        </div>
        <div class="col-lg-2 col-md-3 col-sm-6 col-12 px-1">
            <select id="filter_status" class="form-control form-control-sm">
                <option value="">All Statuses</option>
                <option value="Preliminary">Preliminary</option>
                <option value="Confirmed">Confirmed</option>
                <option value="Probable">Probable</option>
                <option value="Unconfirmed">Unconfirmed</option>
            </select>
        </div>
        <div class="col-lg-2 col-md-3 col-sm-6 col-12 px-1">
            <button id="btn_search" class="action-button" style="font-size:14px; width:100%;">Search</button>
        </div>
    </div>

    <!-- Message -->
    <div id="message" class="auth-message" style="display:none;"></div>

    <!-- Count -->
    <div style="padding:0 10px;">
        <span id="review_count" style="font-size:14px; color:var(--light-foreground);"></span>
    </div>

    <!-- Reviews Table -->
    <div style="padding:10px; max-height:75vh; overflow-y:auto;">
        <div id="reviews_table"></div>
    </div>

    <script src="/js/console_manager.js"></script>
    <script src="/js/resource_manager.js"></script>
    <script src="/js/bootstrap_5.2.3.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/app_messaging.js"></script>

    <script type="module">
        import { fetchReviews } from '/js/api.js';
        import { formatDate } from '/explore/js/utils.js';
        import { getUser } from '/js/auth.js';

        document.addEventListener('DOMContentLoaded', async () => {
            // Auth check for create button
            let user = await getUser();
            if (user) {
                document.getElementById('btn_create_review').style.display = 'inline-block';
            }

            document.getElementById('btn_create_review').addEventListener('click', () => {
                window.location.href = 'review_create.html';
            });

            document.getElementById('btn_search').addEventListener('click', loadReviews);

            // Allow Enter key on inputs
            document.querySelectorAll('#filter_reviewId, #filter_poolId, #filter_qaPerson').forEach(el => {
                el.addEventListener('keyup', (e) => { if (e.key === 'Enter') loadReviews(); });
            });
            document.getElementById('filter_status').addEventListener('change', loadReviews);

            // Initial load
            await loadReviews();
        });

        async function loadReviews() {
            let params = [];
            let reviewId = document.getElementById('filter_reviewId').value.trim();
            let poolId = document.getElementById('filter_poolId').value.trim();
            let qaPerson = document.getElementById('filter_qaPerson').value.trim();
            let status = document.getElementById('filter_status').value;

            if (reviewId) params.push(`reviewId=${reviewId}`);
            if (poolId) params.push(`poolId=${poolId}`);
            if (qaPerson) params.push(`reviewQAPerson=${qaPerson}`);
            if (status) params.push(`reviewStatus=${status}`);

            let searchTerm = params.length ? params.join('&') : false;

            try {
                let data = await fetchReviews(searchTerm);
                let rows = data.rows || [];
                renderReviews(rows);
                document.getElementById('review_count').textContent = `${rows.length} review${rows.length !== 1 ? 's' : ''}`;
                document.getElementById('message').style.display = 'none';
            } catch(err) {
                document.getElementById('message').textContent = `Error loading reviews: ${err.message || err}`;
                document.getElementById('message').style.display = 'block';
                renderReviews([]);
            }
        }

        function renderReviews(rows) {
            if (!rows.length) {
                document.getElementById('reviews_table').innerHTML = '<p style="font-size:14px;">No reviews found.</p>';
                document.getElementById('review_count').textContent = '0 reviews';
                return;
            }
            let html = `<table class="pool-table"><thead><tr>
                <th>Review ID</th><th>Pool ID</th><th>QA Code</th><th>QA Person</th><th>Date</th><th>Status</th>
            </tr></thead><tbody>`;
            rows.forEach(r => {
                html += `<tr class="pool-row" style="cursor:pointer;" onclick="window.location.href='/explore/pool_view.html?poolId=${r.reviewPoolId || ''}'">
                    <td>${r.reviewId || ''}</td>
                    <td>${r.reviewPoolId || ''}</td>
                    <td>${r.reviewQACode || ''}</td>
                    <td>${r.reviewQAPerson || ''}</td>
                    <td>${formatDate(r.reviewQADate)}</td>
                    <td>${r.reviewStatus || ''}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('reviews_table').innerHTML = html;
        }
    </script>
    <script src="/js/app.js"></script>
</body>
</html>
