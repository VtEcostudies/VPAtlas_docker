<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPAtlas - My Profile</title>
    <link rel="stylesheet" href="/css/bootstrap_5.2.3.min.css">
    <link rel="stylesheet" href="/css/font-awesome_6.6.0.all.min.css">
    <link rel="stylesheet" href="/explore/css/common.css">
    <link rel="stylesheet" href="/explore/css/modal.css">
    <link rel="stylesheet" href="/explore/css/pool_list.css">
    <style>
        .profile-page { padding: 20px; max-width: 700px; margin: 0 auto; }
        .form-section {
            margin-bottom: 16px; border: 1px solid #ddd; border-radius: 8px; padding: 12px;
        }
        .form-section-title {
            font-size: 15px; font-weight: 600; color: var(--primary-color); margin-bottom: 10px;
        }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .form-field { flex: 1; min-width: 140px; }
        .form-field.full { flex: 0 0 100%; }
        .form-field label {
            display: block; font-size: 13px; font-weight: 600; margin-bottom: 3px; color: var(--text-secondary);
        }
        .form-field input, .form-field textarea, .form-field select {
            width: 100%; font-size: 16px; padding: 8px; border: 1px solid var(--primary-color); border-radius: 6px;
        }
        .form-field input[disabled], .form-field select[disabled] {
            background: #f5f5f5; color: #888;
        }
        .form-field textarea { resize: vertical; min-height: 50px; }
        .msg { padding: 8px 12px; font-size: 14px; border-radius: 6px; margin-bottom: 12px; display: none; }
        .msg.show { display: block; }
        .msg.info { background: #d1ecf1; color: #0c5460; }
        .msg.success { background: #d4edda; color: #155724; }
        .msg.error { background: #f8d7da; color: #721c24; }
        .profile-meta { font-size: 13px; color: var(--text-secondary); margin-top: 8px; }
        .email-row { display: flex; align-items: flex-end; gap: 8px; }
        .email-row .form-field { flex: 1; }
        .btn-link-style {
            background: none; border: none; color: var(--primary-color);
            cursor: pointer; padding: 8px 0; font-size: 14px; text-decoration: underline;
        }
        .pending-banner {
            background: #fff3cd; color: #856404; border: 1px solid #ffeeba;
            padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-top: 8px;
        }
        .email-history-list { list-style: none; padding: 0; margin: 0; font-size: 14px; }
        .email-history-list li { padding: 4px 0; border-bottom: 1px solid #eee; }
        .email-history-list li:last-child { border-bottom: none; }
        .email-history-list .when { color: var(--text-secondary); font-size: 12px; margin-left: 8px; }
        .email-history-empty { color: var(--text-secondary); font-style: italic; font-size: 13px; }
    </style>
</head>
<body>
    <header>
        <div class="detail-header">
            <button class="exit-button" onclick="window.location.href='/explore/'">&times;</button>
            <h3 class="header-name light-foreground detail-title" id="page_title">My Profile</h3>
            <button id="btn_save" class="action-button" style="font-size:14px; padding:4px 12px; margin-left:auto;">Save</button>
        </div>
    </header>
    <hr class="divider-header">

    <div class="profile-page">
        <div id="message" class="msg"></div>

        <div id="profile_loading"><p>Loading profile...</p></div>

        <div id="profile_form" style="display:none;">
            <div class="form-section">
                <div class="form-section-title">Account</div>
                <div class="form-row">
                    <div class="form-field"><label for="f_username">Username</label><input type="text" id="f_username" disabled></div>
                    <div class="form-field email-row">
                        <div class="form-field" style="flex:1;">
                            <label for="f_email">Email</label>
                            <input type="email" id="f_email" disabled>
                        </div>
                        <button type="button" id="btn_change_email" class="btn-link-style">Change</button>
                    </div>
                </div>

                <div id="email_pending_banner" class="pending-banner" style="display:none;"></div>

                <div id="change_email_form" style="display:none; margin-top:8px; padding:10px; border:1px dashed var(--primary-color); border-radius:6px;">
                    <div class="form-row">
                        <div class="form-field"><label for="f_new_email">New Email</label><input type="email" id="f_new_email" autocomplete="off"></div>
                        <div class="form-field"><label for="f_new_email_confirm">Confirm New Email</label><input type="email" id="f_new_email_confirm" autocomplete="off"></div>
                    </div>
                    <div style="display:flex; gap:8px; margin-top:6px;">
                        <button type="button" id="btn_cancel_change_email" class="btn-link-style">Cancel</button>
                        <button type="button" id="btn_submit_change_email" class="action-button" style="font-size:14px; padding:4px 12px;">Send Confirmation Link</button>
                    </div>
                </div>

                <div class="form-row" style="margin-top:8px;">
                    <div class="form-field"><label for="f_handle">Handle (display name)</label><input type="text" id="f_handle"></div>
                    <div class="form-field"><label for="f_userrole">Role</label><input type="text" id="f_userrole" disabled></div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title">Previous Emails</div>
                <div id="email_history_loading" class="email-history-empty">Loading...</div>
                <ul id="email_history_list" class="email-history-list" style="display:none;"></ul>
                <div id="email_history_empty" class="email-history-empty" style="display:none;">No prior emails on file.</div>
            </div>

            <div class="form-section">
                <div class="form-section-title">Personal</div>
                <div class="form-row">
                    <div class="form-field"><label for="f_firstname">First Name</label><input type="text" id="f_firstname"></div>
                    <div class="form-field"><label for="f_middleName">Middle Name</label><input type="text" id="f_middleName"></div>
                    <div class="form-field"><label for="f_lastname">Last Name</label><input type="text" id="f_lastname"></div>
                </div>
                <div class="form-row">
                    <div class="form-field"><label for="f_userPhone">Phone</label><input type="tel" id="f_userPhone"></div>
                </div>
                <div class="form-row">
                    <div class="form-field full"><label for="f_userAddress">Address</label><textarea id="f_userAddress" rows="2"></textarea></div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title">Credentials &amp; Training</div>
                <div class="form-row">
                    <div class="form-field full"><label for="f_userCredentials">Credentials</label><textarea id="f_userCredentials" rows="2" placeholder="e.g., wetland ecologist, volunteer monitor"></textarea></div>
                </div>
                <div class="form-row">
                    <div class="form-field">
                        <label>Trained Volunteer?</label>
                        <div style="display:flex; gap:10px; margin-top:4px;">
                            <label style="display:flex; align-items:center; gap:4px; font-weight:normal; cursor:pointer;">
                                <input type="radio" name="f_userTrained" value="true" style="width:auto;"> Yes
                            </label>
                            <label style="display:flex; align-items:center; gap:4px; font-weight:normal; cursor:pointer;">
                                <input type="radio" name="f_userTrained" value="false" style="width:auto;"> No
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div id="profile_meta" class="profile-meta"></div>
        </div>
    </div>

    <script src="/js/console_manager.js"></script>
    <script src="/js/resource_manager.js"></script>
    <script src="/js/bootstrap_5.2.3.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/app_messaging.js"></script>

    <script type="module">
        import { fetchUserById, updateUser, requestEmailChange, fetchEmailHistory } from '/js/api.js';
        import { getUser, requireAuth } from '/js/auth.js';
        import { setLocal } from '/js/storage.js';
        import { formatDate } from '/explore/js/utils.js';
        // No profile icon on profile page — that would be recursive

        let currentUser = null;

        // Fields that map to input IDs
        const readOnlyFields = ['username', 'email', 'userrole'];
        const editableFields = ['handle', 'firstname', 'middleName', 'lastname', 'userPhone', 'userAddress', 'userCredentials'];

        document.addEventListener('DOMContentLoaded', async () => {
            if (!(await requireAuth())) return;

            let user = await getUser();
            if (!user || !user.id) {
                document.getElementById('profile_loading').innerHTML =
                    '<p style="color:var(--danger-color);">Unable to load user information.</p>';
                return;
            }

            try {
                let data = await fetchUserById(user.id);
                currentUser = data.rows ? data.rows[0] : data;
                renderProfile(currentUser);
            } catch(err) {
                document.getElementById('profile_loading').innerHTML =
                    `<p style="color:var(--danger-color);">Error: ${err.message || err}</p>`;
                return;
            }

            document.getElementById('btn_save').addEventListener('click', saveProfile);
            wireEmailChange();
            loadEmailHistory(currentUser.id);
        });

        function wireEmailChange() {
            const form = document.getElementById('change_email_form');
            const btnOpen = document.getElementById('btn_change_email');
            const btnCancel = document.getElementById('btn_cancel_change_email');
            const btnSubmit = document.getElementById('btn_submit_change_email');
            const newEmail = document.getElementById('f_new_email');
            const newEmailConfirm = document.getElementById('f_new_email_confirm');

            btnOpen.addEventListener('click', () => {
                form.style.display = 'block';
                newEmail.value = '';
                newEmailConfirm.value = '';
                newEmail.focus();
            });
            btnCancel.addEventListener('click', () => {
                form.style.display = 'none';
            });
            btnSubmit.addEventListener('click', submitEmailChange);
        }

        async function submitEmailChange() {
            const a = document.getElementById('f_new_email').value.trim();
            const b = document.getElementById('f_new_email_confirm').value.trim();
            if (!a) {
                showMsg('Enter the new email address.', 'error');
                return;
            }
            if (a.toLowerCase() !== b.toLowerCase()) {
                showMsg('The two email addresses do not match.', 'error');
                return;
            }
            if (currentUser.email && a.toLowerCase() === currentUser.email.toLowerCase()) {
                showMsg('That is already your current email.', 'error');
                return;
            }
            showMsg('Sending confirmation link...', 'info');
            try {
                await requestEmailChange(currentUser.id, { email: a });
                document.getElementById('change_email_form').style.display = 'none';
                // Refresh to pick up pendingEmail and re-render banner
                const fresh = await fetchUserById(currentUser.id);
                currentUser = fresh.rows ? fresh.rows[0] : fresh;
                renderProfile(currentUser);
                showMsg(`Confirmation link sent to ${a}. Check that inbox to complete the change.`, 'success');
            } catch(err) {
                showMsg('Could not request email change: ' + (err.message || err), 'error');
            }
        }

        async function loadEmailHistory(userId) {
            try {
                const rows = await fetchEmailHistory(userId);
                const arr = Array.isArray(rows) ? rows : (rows.rows || []);
                const list = document.getElementById('email_history_list');
                const empty = document.getElementById('email_history_empty');
                document.getElementById('email_history_loading').style.display = 'none';
                if (!arr.length) {
                    empty.style.display = 'block';
                    return;
                }
                list.innerHTML = arr.map(r =>
                    `<li>${escapeHtml(r.email)}<span class="when">until ${formatDate(r.changedAt)}</span></li>`
                ).join('');
                list.style.display = 'block';
            } catch(err) {
                document.getElementById('email_history_loading').textContent =
                    'Could not load email history.';
            }
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c =>
                ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        function renderProfile(u) {
            // Read-only fields
            readOnlyFields.forEach(f => {
                let el = document.getElementById('f_' + f);
                if (el && u[f] != null) el.value = u[f];
            });

            // Editable fields
            editableFields.forEach(f => {
                let el = document.getElementById('f_' + f);
                if (el && u[f] != null) el.value = u[f];
            });

            // Trained radio
            if (u.userTrained != null) {
                let radio = document.querySelector(`input[name="f_userTrained"][value="${u.userTrained}"]`);
                if (radio) radio.checked = true;
            }

            // Pending email banner
            const banner = document.getElementById('email_pending_banner');
            if (u.pendingEmail) {
                banner.textContent =
                    `A confirmation link has been sent to ${u.pendingEmail}. ` +
                    `The change will not take effect until you click the link in that inbox.`;
                banner.style.display = 'block';
            } else {
                banner.style.display = 'none';
            }

            // Meta
            let meta = [];
            if (u.status) meta.push(`Status: ${u.status}`);
            if (u.createdAt) meta.push(`Joined: ${formatDate(u.createdAt)}`);
            if (u.updatedAt) meta.push(`Updated: ${formatDate(u.updatedAt)}`);
            document.getElementById('profile_meta').textContent = meta.join(' | ');

            document.getElementById('profile_loading').style.display = 'none';
            document.getElementById('profile_form').style.display = 'block';
        }

        async function saveProfile() {
            if (!currentUser || !currentUser.id) return;

            let body = {};
            editableFields.forEach(f => {
                let el = document.getElementById('f_' + f);
                if (el) body[f] = el.value.trim();
            });

            // Trained
            let trainedRadio = document.querySelector('input[name="f_userTrained"]:checked');
            if (trainedRadio) body.userTrained = trainedRadio.value === 'true';

            showMsg('Saving...', 'info');
            try {
                await updateUser(currentUser.id, body);
                // Re-fetch to get the canonical DB record, then update both views
                let freshData = await fetchUserById(currentUser.id);
                let freshUser = freshData.rows ? freshData.rows[0] : freshData;
                if (freshUser) {
                    currentUser = freshUser;
                    // Update the cached auth_user so profile popup and other pages see changes
                    let authUser = await getUser();
                    Object.assign(authUser, freshUser);
                    await setLocal('auth_user', authUser);
                    renderProfile(currentUser);
                }
                showMsg('Profile updated.', 'success');
            } catch(err) {
                showMsg('Error: ' + (err.message || err), 'error');
            }
        }

        function showMsg(text, type) {
            let el = document.getElementById('message');
            el.textContent = text;
            el.className = 'msg show ' + type;
            if (type === 'info' || type === 'success') {
                setTimeout(() => { el.className = 'msg'; }, 3000);
            }
        }
    </script>
    <script>if (typeof appConfig !== "undefined") appConfig.useServiceWorker = false;</script>
    <script src="/js/bandwidth_monitor.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
