<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VPAtlas - Pool Finder</title>
    <link rel="stylesheet" href="/css/bootstrap_5.2.3.min.css">
    <link rel="stylesheet" href="/css/font-awesome_6.6.0.all.min.css">
    <link rel="stylesheet" href="/css/leaflet_1.9.4.css">
    <link rel="stylesheet" href="/explore/css/common.css">
    <link rel="stylesheet" href="/explore/css/modal.css">
    <link rel="stylesheet" href="/css/map.css">
    <link rel="stylesheet" href="/survey/css/visit_queue.css">
    <style>
        html, body { height: 100%; overflow: hidden; }
        .pf-app { display: flex; flex-direction: column; height: 100vh; }

        /* Header */
        .pf-header {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 8px; flex-shrink: 0; border-bottom: 1px solid #ddd;
        }
        .pf-header h3 { font-size: 15px; margin: 0; white-space: nowrap; }

        /* GPS dot */
        .pf-gps-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: #999; border: 2px solid white;
            box-shadow: 0 0 3px rgba(0,0,0,0.3); cursor: pointer; flex-shrink: 0;
        }
        .pf-gps-dot.acquiring { animation: gps-pulse 1.5s infinite; background: #f39c12; }
        .pf-gps-dot.tracking { background: #27ae60; }
        .pf-gps-dot.denied { background: #e74c3c; }
        @keyframes gps-pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

        /* (search bar removed — pools selected on explore page) */

        /* Selected pools chips — inline in header, fat-thumb friendly */
        .pf-chips {
            display: flex; flex-wrap: wrap; gap: 4px;
            padding: 0; overflow: hidden; align-items: center;
        }
        .pf-chip {
            display: flex; align-items: center;
            padding: 6px 4px 6px 12px; background: var(--primary-light);
            border: 1px solid var(--primary-color); border-radius: 16px;
            font-size: 15px; font-weight: 600; color: var(--primary-color);
            min-height: 36px; cursor: pointer;
        }
        .pf-chip .chip-label { white-space: nowrap; }
        .pf-chip .remove {
            display: flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; margin-left: 4px;
            border-radius: 50%; font-size: 18px; line-height: 1;
            color: var(--text-secondary); cursor: pointer;
        }
        .pf-chip .remove:hover, .pf-chip .remove:active {
            background: var(--danger-color); color: white;
        }

        /* Map */
        .pf-map-container { flex: 1; min-height: 0; position: relative; }
        .pf-map-container #map { height: 100%; width: 100%; }

        /* GPS info */
        .pf-gps-info {
            position: absolute; bottom: 10px; left: 10px;
            background: rgba(255,255,255,0.9); padding: 4px 8px;
            border-radius: 6px; font-size: 12px; z-index: 1000;
            box-shadow: var(--shadow-light);
        }

        /* Center-on-me button — top-left of map */
        .pf-center-btn {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; border: 2px solid rgba(0,0,0,0.2); border-radius: 4px;
            width: 40px; height: 40px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-size: 20px; color: #333;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .pf-center-btn:hover, .pf-center-btn:active { background: #e8f5e9; }

        /* Nav panel */
        .pf-nav-panel {
            display: none; flex-shrink: 0; background: white;
            border-top: 2px solid var(--primary-color);
            padding: 8px 10px; max-height: 40vh; overflow-y: auto;
        }
        .pf-nav-panel.active { display: block; }
        .pf-nav-item {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 0; border-bottom: 1px solid #eee;
        }
        .pf-nav-item:last-child { border-bottom: none; }
        .pf-nav-compass { font-size: 24px; width: 30px; text-align: center; color: var(--primary-color); }
        .pf-nav-info { flex: 1; min-width: 0; }
        .pf-nav-info .pool-name { font-weight: 600; font-size: 14px; }
        .pf-nav-info .pool-detail { font-size: 12px; color: var(--text-secondary); }
        .pf-nav-distance { font-size: 16px; font-weight: 600; color: var(--primary-color); text-align: right; min-width: 60px; }
        .pf-nav-actions {
            display: flex; gap: 4px; padding-top: 6px; flex-wrap: wrap;
        }
        .pf-nav-actions a {
            font-size: 12px; padding: 3px 8px; border: 1px solid var(--primary-color);
            border-radius: 6px; color: var(--primary-color); text-decoration: none; white-space: nowrap;
        }
        .pf-nav-actions a.near { background: var(--primary-color); color: white; }

    </style>
</head>
<body>
    <div class="pf-app">
        <!-- Header: search + GPS -->
        <div class="pf-header">
            <a href="/explore/" class="exit-button" style="text-decoration:none;">&times;</a>
            <h3 class="header-name light-foreground" style="margin-right:6px; white-space:normal;">Pool Finder</h3>
            <div class="pf-chips" id="pool_chips" style="flex:1; min-width:0;"></div>
            <div class="pf-gps-dot" id="gps_dot" title="GPS Status"></div>
            <div id="profile_container" style="margin-left:auto;"></div>
        </div>

        <!-- Map -->
        <div class="pf-map-container">
            <div id="map"></div>
            <div class="pf-gps-info" id="gps_info" style="display:none;">
                <span id="gps_accuracy"></span>
            </div>
            <div class="pf-center-btn" id="btn_center" title="Center on my location" style="display:none;">
                <i class="fa fa-crosshairs"></i>
            </div>
        </div>

        <!-- Navigation panel -->
        <div class="pf-nav-panel" id="nav_panel"></div>

        <!-- Saved visits queue (rendered by visit_queue_ui.js) -->
        <div id="visit_queue" style="flex-shrink:0; border-top:1px solid #ddd; max-height:35vh; overflow-y:auto; display:none;"></div>
    </div>

    <script src="/js/console_manager.js"></script>
    <script src="/js/resource_manager.js"></script>
    <script src="/js/bootstrap_5.2.3.min.js"></script>
    <script src="/js/leaflet_1.9.4.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/esri-leaflet_3.0.12.js"></script>

    <script type="module">
        import { GPSMonitor } from './js/gps_monitor.js';
        import { createMap, addPoolMarker, getPoolColor, getSurveyLevel,
                 buildShapeIcon, stateCenter, stateZoom } from '/js/map_common.js';
        import { getLocal, setLocal } from '/js/storage.js';
        import { fetchApiRoute } from '/js/api.js';
        import { setupProfileIcon } from '/js/profile_icon.js';
        import { getUser } from '/js/auth.js';
        import { renderVisitQueue } from './js/visit_queue_ui.js';
        setupProfileIcon();

        let map, gps, userMarker, accuracyCircle;
        let selectedPools = new Map(); // poolId → { row, marker }
        let followUser = true;
        let currentUser = null;

        // =================================================================
        // INIT
        // =================================================================
        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = await getUser();
            map = await createMap('map');

            // Center button
            document.getElementById('btn_center').addEventListener('click', () => {
                if (gps && gps.position) {
                    map.setView([gps.position.lat, gps.position.lng], Math.max(map.getZoom(), 15));
                    followUser = true;
                }
            });
            map.on('dragstart', () => { followUser = false; });

            // Load pools from URL params
            let params = new URLSearchParams(window.location.search);

            // ?pools=X,Y,Z (multi-select from explore page)
            let poolsCsv = params.get('pools');
            if (poolsCsv) {
                let ids = poolsCsv.split(',').map(s => s.trim()).filter(Boolean);
                for (let pid of ids) {
                    if (!selectedPools.has(pid)) await addPoolById(pid);
                }
            }

            // ?poolId=X (single pool from pool_view, map popup, etc.)
            let prePoolId = params.get('poolId');
            if (prePoolId && !selectedPools.has(prePoolId)) {
                await addPoolById(prePoolId);
            }

            // Restore from user settings if no URL params
            if (!poolsCsv && !prePoolId) {
                let userState = await getLocal('user_state');
                let saved = userState && userState.poolFinderPools;
                if (saved && saved.length) {
                    for (let pid of saved) {
                        if (!selectedPools.has(pid)) await addPoolById(pid);
                    }
                } else {
                    await restoreSavedPools();
                }
            }

            // Auto-start GPS
            startGps();

            // Load visit queue
            await renderVisitQueue('visit_queue');

            // Refresh queue on sync events
            window.addEventListener('visitSyncStatus', async (e) => {
                if (e.detail.type === 'uploaded') await renderVisitQueue('visit_queue');
            });
        });

        // =================================================================
        // POOL SELECTION
        // =================================================================
        async function addPoolById(poolId) {
            try {
                let data = await fetchApiRoute(`pools/mapped/${poolId}`);
                let row = data.rows ? data.rows[0] : data;
                if (row) addPool(row);
            } catch(e) { console.warn('PoolFinder: could not load pool', poolId); }
        }

        function addPool(row) {
            let pid = row.poolId || row.mappedPoolId || '';
            if (!pid || selectedPools.has(pid)) return;

            let lat = parseFloat(row.latitude || row.mappedLatitude);
            let lng = parseFloat(row.longitude || row.mappedLongitude);
            if (isNaN(lat) || isNaN(lng)) return;

            let status = row.poolStatus || row.mappedPoolStatus || 'Potential';
            let level = getSurveyLevel(row);
            let marker = addPoolMarker(map, [lat, lng], {
                status: status, surveyLevel: level, size: 22,
                tooltip: `${pid} — ${status}${row.townName ? ', ' + row.townName : ''}`
            });
            marker.on('click', () => zoomToPool(pid));

            selectedPools.set(pid, { row, marker, lat, lng });
            renderChips();
            renderNavPanel();
            savePools();

            // Fit map to all selected pools
            fitToSelectedPools();
        }

        function removePool(poolId) {
            if (selectedPools.size <= 1) {
                // Last pool — go back to explore to select more
                window.location.href = '/explore/';
                return;
            }
            let entry = selectedPools.get(poolId);
            if (entry) {
                map.removeLayer(entry.marker);
                selectedPools.delete(poolId);
                renderChips();
                renderNavPanel();
                savePools();
            }
        }

        function zoomToPool(poolId) {
            let entry = selectedPools.get(poolId);
            if (entry) {
                map.setView([entry.lat, entry.lng], 17);
                followUser = false;
            }
        }

        function fitToSelectedPools() {
            if (selectedPools.size === 0) return;
            let group = L.featureGroup([...selectedPools.values()].map(e => e.marker));
            map.fitBounds(group.getBounds(), { padding: [50, 50], maxZoom: 16 });
            followUser = false;
        }

        // Persist selected pools to IndexedDB
        async function savePools() {
            let ids = [...selectedPools.keys()];
            await setLocal('poolfinder_pools', ids);
            // Sync to user_state so explore page checkboxes stay in sync
            try {
                let state = await getLocal('user_state') || {};
                state.poolFinderPools = ids;
                await setLocal('user_state', state);
            } catch(e) {}
        }

        async function restoreSavedPools() {
            let ids = await getLocal('poolfinder_pools');
            if (ids && ids.length) {
                for (let pid of ids) await addPoolById(pid);
            }
        }

        // =================================================================
        // CHIPS
        // =================================================================
        function renderChips() {
            let container = document.getElementById('pool_chips');
            let html = '';
            for (let [pid, entry] of selectedPools) {
                html += `<span class="pf-chip" data-pool="${pid}">
                    <span class="chip-label">${pid}</span><span class="remove" data-pool="${pid}">&times;</span>
                </span>`;
            }
            container.innerHTML = html;
            // Chip label click → zoom to pool
            container.querySelectorAll('.chip-label').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    zoomToPool(el.closest('.pf-chip').dataset.pool);
                });
            });
            // Remove button click → remove pool
            container.querySelectorAll('.remove').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removePool(el.dataset.pool);
                });
            });
        }

        // =================================================================
        // NAVIGATION PANEL
        // =================================================================
        function renderNavPanel() {
            let panel = document.getElementById('nav_panel');
            if (selectedPools.size === 0) {
                panel.classList.remove('active');
                return;
            }
            panel.classList.add('active');
            updateNavContent();
        }

        function updateNavContent() {
            let panel = document.getElementById('nav_panel');
            let html = '';

            // Sort by distance if GPS available
            let entries = [...selectedPools.entries()];
            if (gps && gps.position) {
                entries.sort((a, b) => {
                    let da = GPSMonitor.distance(gps.position.lat, gps.position.lng, a[1].lat, a[1].lng);
                    let db = GPSMonitor.distance(gps.position.lat, gps.position.lng, b[1].lat, b[1].lng);
                    return da - db;
                });
            }

            entries.forEach(([pid, entry]) => {
                let row = entry.row;
                let status = row.poolStatus || row.mappedPoolStatus || '';
                let town = row.townName || '';
                let county = row.countyName || '';
                let loc = town ? `${town}${county ? ' (' + county + ')' : ''}` : '';

                let distHtml = '', near = false;
                if (gps && gps.position) {
                    let dist = GPSMonitor.distance(gps.position.lat, gps.position.lng, entry.lat, entry.lng);
                    let bearing = GPSMonitor.bearing(gps.position.lat, gps.position.lng, entry.lat, entry.lng);
                    let compass = GPSMonitor.compassDir(bearing);
                    near = dist < 100;
                    distHtml = `
                        <div class="pf-nav-compass"><span style="display:inline-block; transform:rotate(${bearing}deg);">&#8593;</span></div>
                        <div class="pf-nav-distance">${GPSMonitor.formatDistance(dist)}<br><small>${compass}</small></div>`;
                }

                let nearClass = near ? ' near' : '';
                let gpsCoords = gps && gps.position ? `&lat=${gps.position.lat.toFixed(6)}&lng=${gps.position.lng.toFixed(6)}` : '';

                let monitorHtml = '';
                let userRole = currentUser && currentUser.userrole;
                if (userRole === 'admin' || userRole === 'monitor') {
                    monitorHtml = `<a href="/survey/survey_create.html?poolId=${pid}" class="${nearClass}">+ Monitor Survey</a>`;
                }

                html += `<div class="pf-nav-item" onclick="event.target.tagName==='A'||document.dispatchEvent(new CustomEvent('zoom-pool',{detail:'${pid}'}))">
                    ${distHtml}
                    <div class="pf-nav-info">
                        <div class="pool-name">${pid} — ${status}</div>
                        <div class="pool-detail">${loc}</div>
                        <div class="pf-nav-actions">
                            <a href="/survey/visit_create.html?poolId=${pid}${gpsCoords}" class="${nearClass}">+ Atlas Visit</a>
                            ${monitorHtml}
                        </div>
                    </div>
                </div>`;
            });

            // Add "+ New Pool" at the end
            let newPoolCoords = gps && gps.position ? `?lat=${gps.position.lat.toFixed(6)}&lng=${gps.position.lng.toFixed(6)}` : '';
            html += `<div class="pf-nav-item" style="justify-content:center; padding:8px;">
                <a href="/survey/visit_create.html${newPoolCoords}" style="font-size:14px; font-weight:600; padding:6px 16px;
                    border:1px solid var(--primary-color); border-radius:6px; color:var(--primary-color); text-decoration:none;">
                    <i class="fa fa-plus"></i> New Pool</a>
            </div>`;

            panel.innerHTML = html;
        }

        // Listen for zoom-pool events
        document.addEventListener('zoom-pool', (e) => zoomToPool(e.detail));

        // =================================================================
        // GPS
        // =================================================================
        function startGps() {
            gps = new GPSMonitor();

            gps.on('position', (pos) => {
                updateUserMarker(pos);
                updateGpsDisplay(pos);
                if (followUser) {
                    let z = map.getZoom();
                    if (z < 12) map.setView([pos.lat, pos.lng], 14);
                    else map.panTo([pos.lat, pos.lng]);
                }
                // Update nav distances
                if (selectedPools.size > 0) updateNavContent();
            });

            gps.on('status', (s) => {
                let dot = document.getElementById('gps_dot');
                dot.className = 'pf-gps-dot' +
                    (s.denied ? ' denied' : s.acquiring ? ' acquiring' : s.tracking ? ' tracking' : '');
                document.getElementById('btn_center').style.display = s.tracking ? 'flex' : 'none';
                document.getElementById('gps_info').style.display = s.tracking ? 'block' : 'none';
            });

            gps.on('error', (err) => console.warn('GPS:', err.message));

            gps.start();
        }

        function updateUserMarker(pos) {
            let ll = [pos.lat, pos.lng];
            if (!userMarker) {
                userMarker = L.circleMarker(ll, {
                    radius: 8, fillColor: '#4285F4', color: 'white',
                    weight: 3, fillOpacity: 1, zIndexOffset: 1000
                }).addTo(map);
                accuracyCircle = L.circle(ll, {
                    radius: pos.accuracy, color: '#4285F4', fillColor: '#4285F4',
                    fillOpacity: 0.1, weight: 1, interactive: false
                }).addTo(map);
            } else {
                userMarker.setLatLng(ll);
                accuracyCircle.setLatLng(ll).setRadius(pos.accuracy);
            }
        }

        function updateGpsDisplay(pos) {
            let q = GPSMonitor.accuracyLabel(pos.accuracy);
            document.getElementById('gps_accuracy').innerHTML =
                `<span style="color:${q.color};">\u25cf</span> ${q.label} (${Math.round(pos.accuracy)}m)`;
        }
    </script>
    <script src="/js/app.js"></script>
</body>
</html>
