<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPAtlas - Survey Detail</title>
    <link rel="stylesheet" href="/css/bootstrap_5.2.3.min.css">
    <link rel="stylesheet" href="/css/font-awesome_6.6.0.all.min.css">
    <link rel="stylesheet" href="/css/leaflet_1.9.4.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/pool_list.css">
    <link rel="stylesheet" href="/css/map.css">
</head>
<body>
    <header>
        <div class="detail-header">
            <button class="exit-button" onclick="history.back()">&times;</button>
            <h3 class="header-name light-foreground detail-title" id="page_title">Survey Detail</h3>
        </div>
    </header>
    <hr class="divider-header">

    <div class="row">
        <!-- Left: Survey info -->
        <div class="col-lg-6 col-12" style="max-height:85vh; overflow-y:auto; padding:10px;">
            <div id="survey_info"></div>

            <div id="amphibian_section"></div>

            <div id="macro_section"></div>
        </div>

        <!-- Right: Map -->
        <div class="col-lg-6 col-12" style="height:85vh;">
            <div id="map" style="height:100%; width:100%; border-radius:var(--border-radius);"></div>
        </div>
    </div>

    <script src="/js/console_manager.js"></script>
    <script src="/js/resource_manager.js"></script>
    <script src="/js/bootstrap_5.2.3.min.js"></script>
    <script src="/js/leaflet_1.9.4.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/esri-leaflet_3.0.12.js"></script>
    <script src="/js/app_messaging.js"></script>

    <script type="module">
        import { fetchSurveyById } from './js/api.js';
        import { formatDate } from './js/utils.js';
        import { createMap, addPoolMarker } from './js/map_common.js';

        const params = new URLSearchParams(window.location.search);
        const surveyId = params.get('surveyId');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!surveyId) {
                document.getElementById('survey_info').innerHTML = '<p>No survey ID specified.</p>';
                return;
            }

            document.getElementById('page_title').textContent = `Survey ${surveyId}`;

            try {
                let data = await fetchSurveyById(surveyId);
                let survey = Array.isArray(data) ? data[0] : (data.rows ? data.rows[0] : data);
                if (!survey) {
                    document.getElementById('survey_info').innerHTML = '<p>Survey not found.</p>';
                    return;
                }

                // Descriptive title
                let typeName = survey.surveyTypeName || 'Survey';
                let poolId = survey.surveyPoolId || '';
                let town = survey.townName || '';
                let county = survey.countyName || '';
                let date = formatDate(survey.surveyDate);
                let observer = survey.surveyUserLogin || survey.surveyUserName || '';
                let loc = town ? `${town}${county ? ' (' + county + ')' : ''}` : '';
                let title = `${typeName} ${surveyId} of pool ${poolId}`;
                if (loc) title += ` in ${loc}`;
                if (date) title += ` on ${date}`;
                if (observer) title += ` by ${observer}`;
                document.getElementById('page_title').textContent = title;
                document.title = `VPAtlas - ${title}`;

                renderSurveyInfo(survey);
                renderAmphibians(survey);
                renderMacros(survey);
                initMap(survey);
            } catch(err) {
                document.getElementById('survey_info').innerHTML =
                    `<p style="color:var(--danger-color);">Error: ${err.message || JSON.stringify(err)}</p>`;
            }
        });

        function renderSurveyInfo(s) {
            let html = `<table class="pool-table" style="font-size:15px;">
                <tr><td><strong>Survey ID</strong></td><td>${s.surveyId || ''}</td></tr>
                <tr><td><strong>Pool ID</strong></td><td><a href="pool_view.html?poolId=${s.surveyPoolId}">${s.surveyPoolId || ''}</a></td></tr>
                <tr><td><strong>Type</strong></td><td>${s.surveyTypeName || ''}</td></tr>
                <tr><td><strong>Date</strong></td><td>${formatDate(s.surveyDate)}</td></tr>
                <tr><td><strong>Time</strong></td><td>${s.surveyTime || ''}</td></tr>
                <tr><td><strong>Observer</strong></td><td>${s.surveyUserLogin || s.surveyUserName || s.surveyUserEmail || ''}</td></tr>
                <tr><td><strong>Town</strong></td><td>${s.townName || ''}</td></tr>
                <tr><td><strong>County</strong></td><td>${s.countyName || ''}</td></tr>`;

            // Physical parameters
            if (s.surveyAirTempF) html += `<tr><td><strong>Air Temp (F)</strong></td><td>${s.surveyAirTempF}</td></tr>`;
            if (s.surveyHumidity) html += `<tr><td><strong>Humidity (%)</strong></td><td>${s.surveyHumidity}</td></tr>`;
            if (s.surveyWindBeaufort != null) html += `<tr><td><strong>Wind (Beaufort)</strong></td><td>${s.surveyWindBeaufort}</td></tr>`;
            if (s.surveyWeatherConditions) html += `<tr><td><strong>Weather</strong></td><td>${s.surveyWeatherConditions}</td></tr>`;
            if (s.surveyWeatherNotes) html += `<tr><td><strong>Weather Notes</strong></td><td>${s.surveyWeatherNotes}</td></tr>`;
            if (s.surveyIceCover != null) html += `<tr><td><strong>Ice Cover</strong></td><td>${s.surveyIceCover}</td></tr>`;
            if (s.surveyWaterLevel != null) html += `<tr><td><strong>Water Level</strong></td><td>${s.surveyWaterLevel}</td></tr>`;

            // Vegetation
            let veg = [
                s.surveySubmergedVeg != null ? `Submerged: ${s.surveySubmergedVeg}` : null,
                s.surveyFloatingVeg != null ? `Floating: ${s.surveyFloatingVeg}` : null,
                s.surveyEmergentVeg != null ? `Emergent: ${s.surveyEmergentVeg}` : null,
                s.surveyShrubs != null ? `Shrubs: ${s.surveyShrubs}` : null,
                s.surveyTrees != null ? `Trees: ${s.surveyTrees}` : null,
            ].filter(Boolean);
            if (veg.length) html += `<tr><td><strong>Vegetation</strong></td><td>${veg.join(', ')}</td></tr>`;

            // Equipment
            if (s.surveyAcousticMonitor) html += `<tr><td><strong>Acoustic Monitor</strong></td><td>${s.surveyAcousticMonitor}</td></tr>`;
            if (s.surveyHoboLogger) html += `<tr><td><strong>HOBO Logger</strong></td><td>${s.surveyHoboLogger}</td></tr>`;
            if (s.surveyHoboData) html += `<tr><td><strong>HOBO Data</strong></td><td>${s.surveyHoboData}</td></tr>`;

            if (s.surveyPhysicalParametersNotes) html += `<tr><td><strong>Notes</strong></td><td>${s.surveyPhysicalParametersNotes}</td></tr>`;
            if (s.surveySpermatophores) html += `<tr><td><strong>Spermatophores</strong></td><td>Yes</td></tr>`;
            if (s.surveyAmphibMacroNotes) html += `<tr><td><strong>Amphib/Macro Notes</strong></td><td>${s.surveyAmphibMacroNotes}</td></tr>`;

            html += `</table>`;
            document.getElementById('survey_info').innerHTML = html;
        }

        function renderAmphibians(s) {
            let amphibJson = s.surveyAmphibJson;
            if (!amphibJson || !Object.keys(amphibJson).length) return;

            let html = `<hr><h5>Amphibian Observations</h5>`;
            html += `<table class="pool-table" style="font-size:14px;">
                <thead><tr>
                    <th>Observer</th><th>Location</th>
                    <th>WOFR</th><th>SPSA</th><th>JESA</th><th>BLSA</th>
                </tr></thead><tbody>`;

            for (let [key, obs] of Object.entries(amphibJson)) {
                let email = obs.surveyAmphibObsEmail || '';
                // Edge counts
                let hasEdge = [obs.surveyAmphibEdgeWOFR, obs.surveyAmphibEdgeSPSA,
                    obs.surveyAmphibEdgeJESA, obs.surveyAmphibEdgeBLSA].some(v => v > 0);
                let hasInterior = [obs.surveyAmphibInteriorWOFR, obs.surveyAmphibInteriorSPSA,
                    obs.surveyAmphibInteriorJESA, obs.surveyAmphibInteriorBLSA].some(v => v > 0);

                if (hasEdge || !hasInterior) {
                    html += `<tr>
                        <td>${email}</td><td>Edge</td>
                        <td>${obs.surveyAmphibEdgeWOFR || 0}</td>
                        <td>${obs.surveyAmphibEdgeSPSA || 0}</td>
                        <td>${obs.surveyAmphibEdgeJESA || 0}</td>
                        <td>${obs.surveyAmphibEdgeBLSA || 0}</td>
                    </tr>`;
                }
                if (hasInterior) {
                    html += `<tr>
                        <td>${email}</td><td>Interior</td>
                        <td>${obs.surveyAmphibInteriorWOFR || 0}</td>
                        <td>${obs.surveyAmphibInteriorSPSA || 0}</td>
                        <td>${obs.surveyAmphibInteriorJESA || 0}</td>
                        <td>${obs.surveyAmphibInteriorBLSA || 0}</td>
                    </tr>`;
                }
            }
            html += `</tbody></table>`;
            document.getElementById('amphibian_section').innerHTML = html;
        }

        function renderMacros(s) {
            let macroJson = s.surveyMacroJson;
            if (!macroJson || !Object.keys(macroJson).length) return;

            let hasCounts = Object.values(macroJson).some(v => v > 0);
            if (!hasCounts) return;

            let html = `<hr><h5>Macro-invertebrates</h5>`;
            html += `<table class="pool-table" style="font-size:14px;">
                <thead><tr><th>Direction</th><th>Caddisfly</th><th>Fairy Shrimp</th></tr></thead><tbody>`;

            ['North', 'South', 'East', 'West', 'Total'].forEach(dir => {
                let cdfy = macroJson[`surveyMacro${dir}CDFY`];
                let fash = macroJson[`surveyMacro${dir}FASH`];
                if (cdfy || fash) {
                    html += `<tr><td>${dir}</td><td>${cdfy || 0}</td><td>${fash || 0}</td></tr>`;
                }
            });
            html += `</tbody></table>`;
            document.getElementById('macro_section').innerHTML = html;
        }

        async function initMap(s) {
            let lat = parseFloat(s.surveyPoolLatitude);
            let lng = parseFloat(s.surveyPoolLongitude);
            if (isNaN(lat) || isNaN(lng)) return;
            let status = s.mappedPoolStatus || 'Potential';
            let map = await createMap('map', { center: [lat, lng], zoom: 16 });
            let town = s.townName || '';
            addPoolMarker(map, [lat, lng], {
                status: status,
                surveyLevel: 'monitored',
                size: 22,
                tooltip: `${s.surveyPoolId} — ${status}${town ? ', ' + town : ''}`,
                popup: `Survey ${s.surveyId} — Pool ${s.surveyPoolId}`
            });
        }
    </script>
    <script src="/js/app.js"></script>
</body>
</html>
