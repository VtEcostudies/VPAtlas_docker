<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPAtlas - Survey Detail</title>
    <link rel="stylesheet" href="/css/bootstrap_5.2.3.min.css">
    <link rel="stylesheet" href="/css/font-awesome_6.6.0.all.min.css">
    <link rel="stylesheet" href="/css/leaflet_1.9.4.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/pool_list.css">
    <link rel="stylesheet" href="./css/modal.css">
    <link rel="stylesheet" href="/css/map.css">
    <style>
        .survey-detail { padding: 10px; }
        .detail-section {
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
        }
        .detail-section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 6px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 14px;
            border-bottom: 1px solid #f5f5f5;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: var(--text-secondary); font-weight: 600; min-width: 120px; }
        .detail-value { text-align: right; flex: 1; }
        .egg-table { width: 100%; font-size: 13px; border-collapse: collapse; }
        .egg-table th, .egg-table td { padding: 4px 6px; border-bottom: 1px solid #eee; text-align: center; }
        .egg-table th { font-weight: 600; color: var(--primary-color); font-size: 12px; }
        .egg-table td:first-child, .egg-table th:first-child { text-align: left; }
        .egg-table .total-row { font-weight: 600; border-top: 2px solid var(--primary-color); }
        .observer-label {
            font-size: 13px; font-weight: 600; color: var(--primary-dark);
            margin: 6px 0 2px; padding-bottom: 2px; border-bottom: 1px solid #eee;
        }
        .macro-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
        }
        .macro-cell {
            border: 1px solid #eee; border-radius: 6px; padding: 6px 8px; text-align: center;
        }
        .macro-cell .dir { font-size: 12px; font-weight: 600; color: var(--primary-color); }
        .macro-cell .counts { font-size: 13px; }

        /* Mobile tab bar for detail+map pages */
        .dv-tabs { display: none; }
        @media (max-width: 900px) {
            .dv-pane { display: none !important; height: calc(100dvh - 90px - 52px) !important; max-height: none !important; min-height: 0; }
            .dv-content[data-active-tab="detail"] .dv-pane-detail { display: block !important; }
            .dv-content[data-active-tab="map"]    .dv-pane-map    { display: block !important; }
            .dv-content[data-active-tab] .dv-pane { flex: 0 0 100%; max-width: 100%; }
            .dv-tabs {
                display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
                border-top: 1px solid #ddd; background: white; box-shadow: 0 -2px 6px rgba(0,0,0,0.08);
            }
            .dv-tab-btn {
                flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
                padding: 6px 2px; border: none; background: white; color: var(--text-secondary);
                font-size: 11px; cursor: pointer; border-radius: 0;
            }
            .dv-tab-btn i { font-size: 18px; margin-bottom: 2px; }
            .dv-tab-btn.active { color: var(--primary-color); border-top: 2px solid var(--primary-color); font-weight: 600; }
            body { padding-bottom: 52px; }
        }
    </style>
    <script src="/js/home_button.js" defer></script>
</head>
<body>
    <header>
        <div class="detail-header">
            <a class="home-button" href="/explore/" title="Home"><i class="fa fa-house"></i></a>
            <button class="exit-button" onclick="history.back()" title="Back">&times;</button>
            <h3 class="header-name light-foreground detail-title" id="page_title">Survey Detail</h3>
            <button id="btn_edit" class="action-button" style="display:none;">Edit Survey</button>
            <div id="profile_container" style="margin-left:auto;"></div>
        </div>
    </header>
    <hr class="divider-header">

    <div class="row dv-content" id="dv_content">
        <!-- Left: Survey info -->
        <div class="col-lg-6 col-12 dv-pane dv-pane-detail survey-detail" style="max-height:85vh; overflow-y:auto;">
            <div id="survey_content"></div>
        </div>

        <!-- Right: Map -->
        <div class="col-lg-6 col-12 dv-pane dv-pane-map" style="height:85vh; position:relative;">
            <div id="map" style="height:100%; width:100%; border-radius:var(--border-radius);"></div>
            <div id="btn_center" title="Zoom to pool" style="position:absolute; top:10px; left:10px; z-index:1000;
                background:white; border:2px solid rgba(0,0,0,0.2); border-radius:4px;
                width:40px; height:40px; display:flex; align-items:center; justify-content:center;
                cursor:pointer; font-size:20px; color:#333; box-shadow:0 1px 4px rgba(0,0,0,0.2);">
                <i class="fa fa-crosshairs"></i>
            </div>
        </div>
    </div>

    <!-- Mobile tab bar -->
    <div class="dv-tabs" id="dv_tabs">
        <button class="dv-tab-btn active" data-tab="detail"><i class="fa fa-info-circle"></i>Detail</button>
        <button class="dv-tab-btn" data-tab="map"><i class="fa fa-map"></i>Map</button>
    </div>

    <script src="/js/console_manager.js"></script>
    <script src="/js/resource_manager.js"></script>
    <script src="/js/bootstrap_5.2.3.min.js"></script>
    <script src="/js/leaflet_1.9.4.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/esri-leaflet_3.0.12.js"></script>

    <script type="module">
        import { fetchFieldSurveyById } from '/js/api.js';
        import { formatDate } from './js/utils.js';
        import { createMap, addPoolMarker } from '/js/map_common.js';
        import { getUser } from '/js/auth.js';
        import { setupProfileIcon } from '/js/profile_icon.js';
        setupProfileIcon();

        const ICE_COVER = { 0:'0%', 1:'1-10%', 2:'11-25%', 3:'26-50%', 4:'51-75%', 5:'76-95%', 6:'>95%' };
        const VEG_COVER = { 0:'0%', 1:'1-10%', 2:'11-25%', 3:'26-50%', 4:'51-75%', 5:'≥76%' };
        const WIND = { 0:'Calm', 1:'Light air', 2:'Light breeze', 3:'Gentle', 4:'Moderate', 5:'Fresh', 6:'Strong' };
        const VIS_IMP = { 0:'None', 1:'<25%', 2:'25-50%', 3:'>50%' };

        const params = new URLSearchParams(window.location.search);
        const surveyId = params.get('surveyId');
        let surveyMap = null;

        // Mobile tab switching
        const dvMobile = window.matchMedia('(max-width: 900px)');
        function dvSwitchTab(t) {
            let el = document.getElementById('dv_content');
            if (!el) return;
            el.dataset.activeTab = t;
            document.querySelectorAll('.dv-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
            if (t === 'map' && surveyMap) setTimeout(() => surveyMap.invalidateSize(), 100);
        }
        document.querySelectorAll('.dv-tab-btn').forEach(b => b.addEventListener('click', () => dvSwitchTab(b.dataset.tab)));
        dvMobile.addEventListener('change', (e) => {
            let el = document.getElementById('dv_content');
            if (!el) return;
            if (e.matches) { if (!el.dataset.activeTab) el.dataset.activeTab = 'detail'; }
            else { delete el.dataset.activeTab; }
            if (surveyMap) setTimeout(() => surveyMap.invalidateSize(), 150);
        });
        if (dvMobile.matches) { let el = document.getElementById('dv_content'); if (el) el.dataset.activeTab = 'detail'; }

        function v(val) { return (val != null && val !== '' && val !== 'None') ? val : null; }
        function row(label, val) { return val != null ? `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${val}</span></div>` : ''; }
        function lookup(map, key) { return key != null ? `${key} — ${map[key] || key}` : null; }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!surveyId) {
                document.getElementById('survey_content').innerHTML = '<p>No survey ID specified.</p>';
                return;
            }

            try {
                let s = await fetchFieldSurveyById(surveyId);
                if (!s || s.message) {
                    document.getElementById('survey_content').innerHTML = '<p>Survey not found.</p>';
                    return;
                }

                // Title
                let typeName = s.surveyTypeName || 'Survey';
                let town = s.townName || '';
                let county = s.countyName || '';
                let loc = town ? `${town}${county ? ' (' + county + ')' : ''}` : '';
                let title = `${typeName} of pool ${s.surveyPoolId}`;
                if (loc) title += ` in ${loc}`;
                if (s.surveyDate) title += ` on ${formatDate(s.surveyDate)}`;
                document.getElementById('page_title').textContent = title;
                document.title = `VPAtlas - ${title}`;

                let html = '';

                // ---- Survey Info ----
                html += `<div class="detail-section">
                    <div class="detail-section-title">Survey Info</div>
                    ${row('Pool ID', `<a href="pool_view.html?poolId=${s.surveyPoolId}">${s.surveyPoolId}</a>`)}
                    ${row('Survey ID', s.surveyId)}
                    ${row('Type', s.surveyTypeName)}
                    ${row('Date', formatDate(s.surveyDate))}
                    ${row('Time', v(s.surveyTime))}
                    ${row('Observer', s.surveyUserLogin || s.surveyUserEmail || '')}
                    ${row('Town', town)}
                    ${row('County', county)}
                </div>`;

                // ---- Equipment ----
                let hasEquip = v(s.surveyAcousticMonitor) || v(s.surveyHoboLogger) || v(s.surveyHoboData);
                if (hasEquip) {
                    html += `<div class="detail-section">
                        <div class="detail-section-title">Equipment</div>
                        ${row('Acoustic Monitor', v(s.surveyAcousticMonitor))}
                        ${row('HOBO Logger', v(s.surveyHoboLogger))}
                        ${row('HOBO Data', v(s.surveyHoboData))}
                    </div>`;
                }

                // ---- Physical Parameters ----
                let hasPhys = s.surveyIceCover != null || v(s.surveyWaterLevel) != null
                    || v(s.surveyPhysicalParametersNotes);
                let hasVeg = [s.surveySubmergedVeg, s.surveyFloatingVeg, s.surveyEmergentVeg,
                    s.surveyShrubs, s.surveyTrees].some(x => x != null);
                if (hasPhys || hasVeg) {
                    html += `<div class="detail-section">
                        <div class="detail-section-title">Physical Parameters</div>
                        ${row('Ice Cover', lookup(ICE_COVER, s.surveyIceCover))}
                        ${row('Water Level (cm)', v(s.surveyWaterLevel))}
                        ${row('Submerged Veg', lookup(VEG_COVER, s.surveySubmergedVeg))}
                        ${row('Floating Veg', lookup(VEG_COVER, s.surveyFloatingVeg))}
                        ${row('Emergents', lookup(VEG_COVER, s.surveyEmergentVeg))}
                        ${row('Shrubs', lookup(VEG_COVER, s.surveyShrubs))}
                        ${row('Trees', lookup(VEG_COVER, s.surveyTrees))}
                        ${row('Notes', v(s.surveyPhysicalParametersNotes))}
                    </div>`;
                }

                // ---- Weather ----
                let hasWeather = v(s.surveyAirTempF) != null || v(s.surveyHumidity) != null
                    || s.surveyWindBeaufort != null || v(s.surveyWeatherConditions);
                if (hasWeather) {
                    html += `<div class="detail-section">
                        <div class="detail-section-title">Weather</div>
                        ${row('Air Temp (°F)', v(s.surveyAirTempF))}
                        ${row('Humidity (%)', v(s.surveyHumidity))}
                        ${row('Wind (Beaufort)', lookup(WIND, s.surveyWindBeaufort))}
                        ${row('Conditions', v(s.surveyWeatherConditions))}
                        ${row('Weather Notes', v(s.surveyWeatherNotes))}
                    </div>`;
                }

                // ---- Amphibian Egg Mass Survey ----
                if (s.amphib && s.amphib.length) {
                    html += renderAmphibSection(s.amphib, s);
                }

                // ---- Macroinvertebrates ----
                if (s.macro) {
                    html += renderMacroSection(s.macro);
                }

                // ---- Additional Notes ----
                let hasNotes = v(s.surveySpermatophores) || v(s.surveyAmphibMacroNotes) || v(s.surveyMiscNotes);
                if (hasNotes) {
                    html += `<div class="detail-section">
                        <div class="detail-section-title">Notes</div>
                        ${s.surveySpermatophores ? row('Spermatophores', 'Yes') : ''}
                        ${row('Amphib/Macro Notes', v(s.surveyAmphibMacroNotes))}
                        ${row('Misc Notes', v(s.surveyMiscNotes))}
                    </div>`;
                }

                // ---- Photos (grid, at the bottom) ----
                let photos = Array.isArray(s.surveyPhotos) ? s.surveyPhotos : [];
                if (photos.length) {
                    let apiBase = (typeof appConfig !== 'undefined' && appConfig.api && appConfig.api.fqdn) || '';
                    html += `<div class="detail-section">
                        <div class="detail-section-title"><i class="fa fa-camera" style="margin-right:4px;"></i>Photos (${photos.length})</div>
                        <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:8px; margin-top:8px;">`;
                    photos.forEach(p => {
                        let type = p.surveyPhotoSpecies || 'Other';
                        let url = (p.surveyPhotoUrl || '').startsWith('http') ? p.surveyPhotoUrl : apiBase + p.surveyPhotoUrl;
                        html += `<a href="${url}" target="_blank" title="${type}" style="position:relative; display:block; aspect-ratio:1/1; border-radius:6px; overflow:hidden; border:1px solid #ddd;">
                            <img src="${url}" alt="${type}" style="width:100%; height:100%; object-fit:cover; display:block;">
                            <span style="position:absolute; left:0; right:0; bottom:0; padding:2px 6px; font-size:11px; font-weight:600;
                                background:rgba(0,0,0,0.55); color:white; text-align:center;">${type}</span>
                        </a>`;
                    });
                    html += `</div></div>`;
                }

                document.getElementById('survey_content').innerHTML = html;

                // Map
                let lat = parseFloat(s.surveyPoolLatitude || s.latitude);
                let lng = parseFloat(s.surveyPoolLongitude || s.longitude);
                if (!isNaN(lat) && !isNaN(lng)) {
                    let map = await createMap('map', { center: [lat, lng], zoom: 16 });
                    surveyMap = map;
                    addPoolMarker(map, [lat, lng], {
                        status: s.poolStatus || 'Potential',
                        surveyLevel: 'monitored', size: 22,
                        tooltip: `${s.surveyPoolId} — ${s.poolStatus || ''}${town ? ', ' + town : ''}`,
                        popup: `Survey ${s.surveyId}`
                    });
                    document.getElementById('btn_center').addEventListener('click', () =>
                        map.setView([lat, lng], 16));
                }

                // Edit button — owner only (not even admins can edit others' surveys)
                let user = await getUser();
                if (user) {
                    let isOwner = (user.id && user.id === s.surveyUserId)
                        || user.email === s.surveyUserEmail;
                    if (isOwner) {
                        let btn = document.getElementById('btn_edit');
                        btn.style.display = 'inline-block';
                        btn.addEventListener('click', () =>
                            window.location.href = `/survey/survey_create.html?surveyId=${surveyId}`);
                    }
                }

            } catch(err) {
                document.getElementById('survey_content').innerHTML =
                    `<p style="color:var(--danger-color);">Error: ${err.message || JSON.stringify(err)}</p>`;
            }
        });

        function renderAmphibSection(amphib, survey) {
            let html = `<div class="detail-section">
                <div class="detail-section-title">Egg Mass Survey</div>`;

            // Edge survey
            let hasEdge = amphib.some(o =>
                o.surveyAmphibEdgeWOFR || o.surveyAmphibEdgeSPSA || o.surveyAmphibEdgeJESA || o.surveyAmphibEdgeBLSA
                || o.surveyAmphibEdgeStart);
            let hasInterior = amphib.some(o =>
                o.surveyAmphibInteriorWOFR || o.surveyAmphibInteriorSPSA || o.surveyAmphibInteriorJESA || o.surveyAmphibInteriorBLSA
                || o.surveyAmphibInteriorStart);

            if (hasEdge || !hasInterior) {
                html += `<div class="observer-label">Edge Survey</div>`;
                html += eggTable(amphib, 'Edge');
                if (survey.surveyEdgeVisualImpairment != null)
                    html += `<div class="detail-row"><span class="detail-label">Visual Impairment</span><span class="detail-value">${lookup(VIS_IMP, survey.surveyEdgeVisualImpairment)}</span></div>`;
            }
            if (hasInterior) {
                html += `<div class="observer-label" style="margin-top:8px;">Interior Survey</div>`;
                html += eggTable(amphib, 'Interior');
                if (survey.surveyInteriorVisualImpairment != null)
                    html += `<div class="detail-row"><span class="detail-label">Visual Impairment</span><span class="detail-value">${lookup(VIS_IMP, survey.surveyInteriorVisualImpairment)}</span></div>`;
            }

            // Observer equipment
            html += `<div style="margin-top:8px;">`;
            amphib.forEach((o, i) => {
                if (o.surveyAmphibPolarizedGlasses != null) {
                    html += `<div class="detail-row"><span class="detail-label">Polarized glasses (Obs ${i+1})</span><span class="detail-value">${o.surveyAmphibPolarizedGlasses ? 'Yes' : 'No'}</span></div>`;
                }
                if (o.surveyAmphibBinoculars != null) {
                    html += `<div class="detail-row"><span class="detail-label">Binoculars (Obs ${i+1})</span><span class="detail-value">${o.surveyAmphibBinoculars ? 'Yes' : 'No'}</span></div>`;
                }
            });
            html += `</div></div>`;
            return html;
        }

        function eggTable(amphib, location) {
            let prefix = `surveyAmphib${location}`;
            let html = `<table class="egg-table">
                <thead><tr><th>Observer</th><th>Start</th><th>Stop</th><th>WOFR</th><th>SPSA</th><th>JESA</th><th>BLSA</th></tr></thead><tbody>`;

            let totals = { WOFR: 0, SPSA: 0, JESA: 0, BLSA: 0 };

            amphib.forEach((o, i) => {
                let wofr = o[`${prefix}WOFR`] || 0;
                let spsa = o[`${prefix}SPSA`] || 0;
                let jesa = o[`${prefix}JESA`] || 0;
                let blsa = o[`${prefix}BLSA`] || 0;
                totals.WOFR += wofr; totals.SPSA += spsa; totals.JESA += jesa; totals.BLSA += blsa;

                let start = o[`${prefix}Start`] || '';
                let stop = o[`${prefix}Stop`] || '';
                let email = o.surveyAmphibObsEmail || '';
                let name = email.split('@')[0]; // short name

                html += `<tr>
                    <td>${name}</td>
                    <td>${start}</td><td>${stop}</td>
                    <td>${wofr}</td><td>${spsa}</td><td>${jesa}</td><td>${blsa}</td>
                </tr>`;
            });

            if (amphib.length > 1) {
                let n = amphib.length;
                let fmt = v => (v / n).toFixed(1).replace(/\.0$/, '');
                html += `<tr class="total-row">
                    <td>Mean</td><td></td><td></td>
                    <td>${fmt(totals.WOFR)}</td><td>${fmt(totals.SPSA)}</td><td>${fmt(totals.JESA)}</td><td>${fmt(totals.BLSA)}</td>
                </tr>`;
            }

            html += `</tbody></table>`;
            return html;
        }

        function renderMacroSection(macro) {
            let hasCounts = ['surveyMacroNorthFASH','surveyMacroNorthCDFY',
                'surveyMacroEastFASH','surveyMacroEastCDFY',
                'surveyMacroSouthFASH','surveyMacroSouthCDFY',
                'surveyMacroWestFASH','surveyMacroWestCDFY'].some(k => macro[k] > 0);
            if (!hasCounts) return '';

            let html = `<div class="detail-section">
                <div class="detail-section-title">Macroinvertebrates</div>
                <div class="macro-grid">`;

            ['North','East','South','West'].forEach(dir => {
                let fash = macro[`surveyMacro${dir}FASH`] || 0;
                let cdfy = macro[`surveyMacro${dir}CDFY`] || 0;
                html += `<div class="macro-cell">
                    <div class="dir">${dir}</div>
                    <div class="counts">FASH: ${fash} &nbsp; CDFY: ${cdfy}</div>
                </div>`;
            });

            html += `</div>`;

            let totalFash = macro.surveyMacroTotalFASH || 0;
            let totalCdfy = macro.surveyMacroTotalCDFY || 0;
            html += `<div style="margin-top:6px; font-size:14px; font-weight:600; text-align:center;">
                Totals — Fairy Shrimp: ${totalFash} &nbsp; Caddisfly: ${totalCdfy}
            </div>`;

            html += `</div>`;
            return html;
        }
    </script>
    <script src="/js/bandwidth_monitor.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
