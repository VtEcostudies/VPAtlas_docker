<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPAtlas - Pool Detail</title>
    <link rel="stylesheet" href="/css/bootstrap_5.2.3.min.css">
    <link rel="stylesheet" href="/css/font-awesome_6.6.0.all.min.css">
    <link rel="stylesheet" href="/css/leaflet_1.9.4.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/modal.css">
    <link rel="stylesheet" href="./css/pool_list.css">
    <link rel="stylesheet" href="/css/map.css">
</head>
<body>
    <header>
        <div class="row controls">
            <div class="px-1 col-xl-1 col-2">
                <button class="exit-button" onclick="window.location.href='/explore/'">&times;</button>
            </div>
            <div class="px-1 col-xl-3 col-4">
                <h3 class="header-name light-foreground" id="page_title">Pool Detail</h3>
            </div>
            <div class="px-1 col-xl-8 col-6" style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="btn_edit" class="action-button" style="display:none; font-size:16px;">Edit Pool</button>
                <button id="btn_add_visit" class="action-button" style="font-size:16px;">Add Visit</button>
                <button id="btn_add_survey" class="action-button" style="font-size:16px;">Add Survey</button>
            </div>
        </div>
    </header>
    <hr class="divider-header">

    <div class="row">
        <!-- Left: Pool info + visits + surveys -->
        <div class="col-lg-6 col-12" style="max-height:85vh; overflow-y:auto; padding:10px;">
            <!-- Pool Info -->
            <div id="pool_info"></div>

            <!-- Visits Table -->
            <hr>
            <h5 id="visits_title">Visits</h5>
            <div id="visits_table"></div>

            <!-- Surveys Table -->
            <hr>
            <h5 id="surveys_title">Surveys (Monitoring)</h5>
            <div id="surveys_table"></div>

            <!-- Reviews Table -->
            <hr>
            <h5 id="reviews_title">Reviews</h5>
            <div id="reviews_table"></div>
        </div>

        <!-- Right: Map -->
        <div class="col-lg-6 col-12" style="height:85vh;">
            <div id="map" style="height:100%; width:100%; border-radius:var(--border-radius);"></div>
        </div>
    </div>

    <script src="/js/console_manager.js"></script>
    <script src="/js/resource_manager.js"></script>
    <script src="/js/bootstrap_5.2.3.min.js"></script>
    <script src="/js/leaflet_1.9.4.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/app_messaging.js"></script>

    <script type="module">
        import { fetchMappedPoolById, fetchVisitsByPool, fetchSurveysByPool, fetchReviews } from './js/api.js';
        import { formatDate } from './js/utils.js';
        import { getUser } from './js/auth.js';

        const params = new URLSearchParams(window.location.search);
        const poolId = params.get('poolId');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!poolId) {
                document.getElementById('pool_info').innerHTML = '<p>No pool ID specified.</p>';
                return;
            }

            document.getElementById('page_title').textContent = `Pool ${poolId}`;

            // Load pool data
            try {
                let data = await fetchMappedPoolById(poolId);
                let pool = data.rows ? data.rows[0] : data;
                renderPoolInfo(pool);
                initPoolMap(pool);
            } catch(err) {
                document.getElementById('pool_info').innerHTML = `<p style="color:var(--danger-color);">Error: ${err.message}</p>`;
            }

            // Load visits
            try {
                let visits = await fetchVisitsByPool(poolId);
                renderVisits(visits.rows || []);
            } catch(err) { renderVisits([]); }

            // Load surveys
            try {
                let surveys = await fetchSurveysByPool(poolId);
                renderSurveys(surveys.rows || []);
            } catch(err) { renderSurveys([]); }

            // Load reviews
            try {
                let reviews = await fetchReviews(`poolId=${poolId}`);
                renderReviews(reviews.rows || []);
            } catch(err) { renderReviews([]); }

            // Setup buttons
            let user = await getUser();
            if (user) {
                document.getElementById('btn_edit').style.display = 'inline-block';
            }
            document.getElementById('btn_edit').addEventListener('click', () =>
                window.location.href = `pool_create.html?poolId=${poolId}`);
            document.getElementById('btn_add_visit').addEventListener('click', () =>
                window.location.href = `visit_create.html?poolId=${poolId}`);
            document.getElementById('btn_add_survey').addEventListener('click', () =>
                window.location.href = `/survey/survey_start.html?poolId=${poolId}`);
        });

        function renderPoolInfo(pool) {
            if (!pool) return;
            let html = `<table class="pool-table" style="font-size:15px;">
                <tr><td><strong>Pool ID</strong></td><td>${pool.mappedPoolId || ''}</td></tr>
                <tr><td><strong>Status</strong></td><td>${pool.poolStatus || pool.mappedPoolStatus || ''}</td></tr>
                <tr><td><strong>Town</strong></td><td>${pool.townName || pool.mappedTownName || ''}</td></tr>
                <tr><td><strong>County</strong></td><td>${pool.countyName || pool.mappedCountyName || ''}</td></tr>
                <tr><td><strong>Method</strong></td><td>${pool.mappedMethod || ''}</td></tr>
                <tr><td><strong>Confidence</strong></td><td>${pool.mappedConfidence || ''}</td></tr>
                <tr><td><strong>Observer</strong></td><td>${pool.mappedObserverUserName || ''}</td></tr>
                <tr><td><strong>Date</strong></td><td>${formatDate(pool.mappedDateText || pool.mappedDate)}</td></tr>
                <tr><td><strong>Location</strong></td><td>${pool.mappedLatitude ? Number(pool.mappedLatitude).toFixed(5) + ', ' + Number(pool.mappedLongitude).toFixed(5) : ''}</td></tr>
                <tr><td><strong>Comments</strong></td><td>${pool.mappedComments || ''}</td></tr>
            </table>`;
            document.getElementById('pool_info').innerHTML = html;
        }

        function renderVisits(rows) {
            document.getElementById('visits_title').textContent = `Visits (${rows.length})`;
            if (!rows.length) {
                document.getElementById('visits_table').innerHTML = '<p style="font-size:14px;">No visits recorded.</p>';
                return;
            }
            let html = `<table class="pool-table"><thead><tr>
                <th>Visit ID</th><th>Date</th><th>Observer</th><th>Pool Located</th>
            </tr></thead><tbody>`;
            rows.forEach(v => {
                html += `<tr class="pool-row" style="cursor:pointer;" onclick="window.location.href='visit_create.html?visitId=${v.visitId}'">
                    <td>${v.visitId || ''}</td>
                    <td>${formatDate(v.visitDate)}</td>
                    <td>${v.visitObserverUserName || v.visitUserName || ''}</td>
                    <td>${v.visitLocatePool || ''}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('visits_table').innerHTML = html;
        }

        function renderSurveys(rows) {
            document.getElementById('surveys_title').textContent = `Surveys (${rows.length})`;
            if (!rows.length) {
                document.getElementById('surveys_table').innerHTML = '<p style="font-size:14px;">No monitoring surveys recorded.</p>';
                return;
            }
            let html = `<table class="pool-table"><thead><tr>
                <th>Survey ID</th><th>Date</th><th>Type</th><th>Observer</th>
            </tr></thead><tbody>`;
            rows.forEach(s => {
                html += `<tr class="pool-row">
                    <td>${s.surveyId || ''}</td>
                    <td>${formatDate(s.surveyDate)}</td>
                    <td>${s.surveyTypeName || ''}</td>
                    <td>${s.surveyUserEmail || ''}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('surveys_table').innerHTML = html;
        }

        function renderReviews(rows) {
            document.getElementById('reviews_title').textContent = `Reviews (${rows.length})`;
            if (!rows.length) {
                document.getElementById('reviews_table').innerHTML = '<p style="font-size:14px;">No reviews.</p>';
                return;
            }
            let html = `<table class="pool-table"><thead><tr>
                <th>Review ID</th><th>QA Code</th><th>QA Person</th><th>Date</th><th>Status</th>
            </tr></thead><tbody>`;
            rows.forEach(r => {
                html += `<tr class="pool-row">
                    <td>${r.reviewId || ''}</td>
                    <td>${r.reviewQACode || ''}</td>
                    <td>${r.reviewQAPerson || ''}</td>
                    <td>${formatDate(r.reviewQADate)}</td>
                    <td>${r.reviewStatus || ''}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('reviews_table').innerHTML = html;
        }

        function initPoolMap(pool) {
            if (!pool || !pool.mappedLatitude) return;
            let lat = Number(pool.mappedLatitude);
            let lng = Number(pool.mappedLongitude);
            let map = L.map('map').setView([lat, lng], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19, attribution: '&copy; OpenStreetMap'
            }).addTo(map);
            L.circleMarker([lat, lng], {
                radius: 10, fillColor: '#2c5530', color: '#333',
                weight: 2, opacity: 1, fillOpacity: 0.8
            }).addTo(map).bindPopup(`Pool ${pool.mappedPoolId}`).openPopup();
        }
    </script>
    <script src="/js/app.js"></script>
</body>
</html>
