<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPAtlas - Pool Detail</title>
    <link rel="stylesheet" href="/css/bootstrap_5.2.3.min.css">
    <link rel="stylesheet" href="/css/font-awesome_6.6.0.all.min.css">
    <link rel="stylesheet" href="/css/leaflet_1.9.4.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/modal.css">
    <link rel="stylesheet" href="./css/pool_list.css">
    <link rel="stylesheet" href="/css/map.css">
    <link rel="stylesheet" href="/survey/css/visit_queue.css">
    <style>
        /* Mobile tab bar for pool_view — hidden on desktop */
        .pv-tabs { display: none; }
        @media (max-width: 900px) {
            .pv-pane {
                display: none !important;
                height: calc(100dvh - 90px - 52px) !important;
                max-height: none !important;
                min-height: 0;
                border: none;
                border-radius: 0;
            }
            .pv-content[data-active-tab="summary"] .pv-pane-summary { display: block !important; }
            .pv-content[data-active-tab="lists"]   .pv-pane-lists   { display: block !important; }
            .pv-content[data-active-tab="map"]     .pv-pane-map     { display: flex !important; }
            .pv-content[data-active-tab] .pv-pane {
                flex: 0 0 100%;
                max-width: 100%;
            }
            .pv-content[data-active-tab="map"] .pv-pane-map {
                height: calc(100dvh - 90px - 52px) !important;
                padding: 0;
            }
            .pv-tabs {
                display: flex;
                position: fixed;
                bottom: 0; left: 0; right: 0;
                z-index: 1000;
                border-top: 1px solid #ddd;
                background: white;
                box-shadow: 0 -2px 6px rgba(0,0,0,0.08);
            }
            .pv-tab-btn {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 6px 2px;
                border: none;
                background: white;
                color: var(--text-secondary);
                font-size: 11px;
                cursor: pointer;
                border-radius: 0;
            }
            .pv-tab-btn i { font-size: 18px; margin-bottom: 2px; }
            .pv-tab-btn.active {
                color: var(--primary-color);
                border-top: 2px solid var(--primary-color);
                font-weight: 600;
            }
            body { padding-bottom: 52px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="detail-header">
            <button class="exit-button" onclick="history.back()">&times;</button>
            <h3 class="header-name light-foreground detail-title" id="page_title">Pool Detail</h3>
            <div class="detail-actions">
                <button id="btn_edit" class="action-button" style="display:none;">Edit Pool</button>
                <button id="btn_find_pool" class="action-button">Find Pool</button>
                <button id="btn_add_visit" class="action-button">+ Atlas Visit</button>
                <button id="btn_add_survey" class="action-button" style="display:none;">+ Monitoring Survey</button>
                <button class="action-overflow-btn" id="action_menu_btn"><i class="fa fa-ellipsis-v"></i></button>
                <div class="action-overflow-panel" id="action_menu_panel"></div>
            </div>
            <div id="profile_container" style="margin-left:auto;"></div>
        </div>
    </header>
    <hr class="divider-header">

    <div class="row pv-content" id="pv_content">
        <!-- Pane 1: Pool summary -->
        <div class="col-lg-4 col-12 pv-pane pv-pane-summary" style="max-height:85vh; overflow-y:auto; padding:10px;">
            <div id="pool_info"></div>
        </div>

        <!-- Pane 2: Lists (visits + surveys + reviews) -->
        <div class="col-lg-4 col-12 pv-pane pv-pane-lists" style="max-height:85vh; overflow-y:auto; padding:10px;">
            <h5 id="visits_title">Visits</h5>
            <div id="visits_table"></div>
            <div id="local_visits" style="margin-top:6px;"></div>
            <hr>
            <h5 id="surveys_title">Surveys (Monitoring)</h5>
            <div id="surveys_table"></div>
            <hr>
            <h5 id="reviews_title">Reviews</h5>
            <div id="reviews_table"></div>
        </div>

        <!-- Pane 3: Map -->
        <div class="col-lg-4 col-12 pv-pane pv-pane-map" style="height:85vh; position:relative;">
            <div id="map" style="height:100%; width:100%; border-radius:var(--border-radius);"></div>
            <div id="btn_center_pool" title="Zoom to pool" style="position:absolute; top:10px; left:10px; z-index:1000;
                background:white; border:2px solid rgba(0,0,0,0.2); border-radius:4px;
                width:40px; height:40px; display:flex; align-items:center; justify-content:center;
                cursor:pointer; font-size:20px; color:#333; box-shadow:0 1px 4px rgba(0,0,0,0.2);">
                <i class="fa fa-crosshairs"></i>
            </div>
        </div>
    </div>

    <!-- Mobile tab bar (hidden on desktop) -->
    <div class="pv-tabs" id="pv_tabs">
        <button class="pv-tab-btn active" data-tab="summary"><i class="fa fa-info-circle"></i>Summary</button>
        <button class="pv-tab-btn" data-tab="lists"><i class="fa fa-list"></i>Lists</button>
        <button class="pv-tab-btn" data-tab="map"><i class="fa fa-map"></i>Map</button>
    </div>

    <script src="/js/console_manager.js"></script>
    <script src="/js/resource_manager.js"></script>
    <script src="/js/bootstrap_5.2.3.min.js"></script>
    <script src="/js/leaflet_1.9.4.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/esri-leaflet_3.0.12.js"></script>
    <script src="/js/app_messaging.js"></script>

    <script>
    // Overflow menu helper
    function initOverflowMenu(btnId, panelId, items) {
        let btn = document.getElementById(btnId);
        let panel = document.getElementById(panelId);
        if (!btn || !panel) return;
        items.forEach(item => {
            let el = document.createElement('button');
            el.className = 'action-button';
            el.textContent = item.label;
            el.addEventListener('click', () => { panel.classList.remove('show'); item.action(); });
            panel.appendChild(el);
        });
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            panel.classList.toggle('show');
        });
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#' + panelId) && !e.target.closest('#' + btnId)) {
                panel.classList.remove('show');
            }
        });
    }
    </script>

    <script type="module">
        import { fetchMappedPoolById, fetchVisitsByPool, fetchSurveysByPool, fetchReviews } from '/js/api.js';
        import { getPoolById, getVisitsByPoolId, getSurveysByPoolId } from '/js/pool_data_cache.js';
        import { prefetchParcelsNear, getCachedParcels } from '/js/parcels.js';
        import { formatDate } from './js/utils.js';
        import { getUser } from '/js/auth.js';
        import { createMap, addPoolMarker, getPoolColor, getSurveyLevel } from '/js/map_common.js';
        import { renderVisitQueue } from '/survey/js/visit_queue_ui.js';
        import { setupProfileIcon } from '/js/profile_icon.js';
        setupProfileIcon();

        const params = new URLSearchParams(window.location.search);
        const poolId = params.get('poolId');
        let poolMap = null; // store map reference for tab switching

        // Mobile tab switching for pool_view
        const pvMobile = window.matchMedia('(max-width: 900px)');
        function pvSwitchTab(tabName) {
            let el = document.getElementById('pv_content');
            if (!el) return;
            el.dataset.activeTab = tabName;
            document.querySelectorAll('.pv-tab-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.tab === tabName));
            if (tabName === 'map' && poolMap) setTimeout(() => poolMap.invalidateSize(), 100);
        }
        document.querySelectorAll('.pv-tab-btn').forEach(btn =>
            btn.addEventListener('click', () => pvSwitchTab(btn.dataset.tab)));
        pvMobile.addEventListener('change', (e) => {
            let el = document.getElementById('pv_content');
            if (!el) return;
            if (e.matches) { if (!el.dataset.activeTab) el.dataset.activeTab = 'summary'; }
            else { delete el.dataset.activeTab; }
            if (poolMap) setTimeout(() => poolMap.invalidateSize(), 150);
        });
        if (pvMobile.matches) {
            let el = document.getElementById('pv_content');
            if (el) el.dataset.activeTab = 'summary';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!poolId) {
                document.getElementById('pool_info').innerHTML = '<p>No pool ID specified.</p>';
                return;
            }

            document.getElementById('page_title').textContent = `Pool ${poolId}`;

            // Load pool data — try API first, fall back to IndexedDB cache
            let pool = null;
            try {
                let data;
                try { data = await fetchMappedPoolById(poolId); }
                catch(e) { data = await getPoolById(poolId); }
                pool = data.rows ? data.rows[0] : data;

                // Descriptive title
                if (pool) {
                    let status = pool.poolStatus || pool.mappedPoolStatus || '';
                    let town = pool.townName || pool.mappedTownName || '';
                    let county = pool.countyName || pool.mappedCountyName || '';
                    let loc = town ? `${town}${county ? ' (' + county + ')' : ''}` : '';
                    let title = `Pool ${poolId}`;
                    if (status) title += ` — ${status}`;
                    if (loc) title += ` in ${loc}`;
                    document.getElementById('page_title').textContent = title;
                    document.title = `VPAtlas - ${title}`;
                }

                renderPoolInfo(pool);
                // Landowner info from parcel layer (async, appends when ready)
                loadLandownerInfo(pool);
            } catch(err) {
                document.getElementById('pool_info').innerHTML = `<p style="color:var(--danger-color);">Error: ${err.message}</p>`;
            }

            // Load visits + surveys — API first, cache fallback
            let hasVisits = false, hasSurveys = false;
            try {
                let visits;
                try { visits = await fetchVisitsByPool(poolId); }
                catch(e) { visits = await getVisitsByPoolId(poolId); }
                let visitRows = visits.rows || [];
                hasVisits = visitRows.length > 0;
                renderVisits(visitRows);
            } catch(err) { renderVisits([]); }

            // Local draft/pending visits
            await renderVisitQueue('local_visits', { poolId });

            try {
                let surveys;
                try { surveys = await fetchSurveysByPool(poolId); }
                catch(e) { surveys = await getSurveysByPoolId(poolId); }
                let surveyRows = Array.isArray(surveys) ? surveys : surveys.rows || [];
                hasSurveys = surveyRows.length > 0;
                renderSurveys(surveyRows);
            } catch(err) { renderSurveys([]); }

            // Now init map with correct survey level
            if (pool) {
                let level = hasSurveys ? 'monitored' : hasVisits ? 'visited' : 'potential';
                initPoolMap(pool, level);
            }

            // Load reviews (no offline cache — just show empty if offline)
            try {
                let reviews = await fetchReviews(`reviewPoolId=${poolId}`);
                renderReviews(reviews.rows || []);
            } catch(err) { renderReviews([], true); }

            // Setup buttons
            let user = await getUser();
            let isAdmin = user && user.userrole === 'admin';
            let isMonitor = user && (user.userrole === 'admin' || user.userrole === 'monitor');
            let canSurvey = isMonitor && hasSurveys;

            // Edit Pool — admin only
            if (isAdmin) {
                document.getElementById('btn_edit').style.display = 'inline-block';
            }
            // + Monitoring Survey — admin/monitor + pool already monitored
            if (canSurvey) {
                document.getElementById('btn_add_survey').style.display = 'inline-block';
            }
            document.getElementById('btn_edit').addEventListener('click', () =>
                window.location.href = `pool_create.html?poolId=${poolId}`);
            document.getElementById('btn_add_visit').addEventListener('click', () =>
                window.location.href = `/survey/visit_create.html?poolId=${poolId}`);
            document.getElementById('btn_add_survey').addEventListener('click', () =>
                window.location.href = `/survey/survey_create.html?poolId=${poolId}`);
            document.getElementById('btn_find_pool').addEventListener('click', () =>
                window.location.href = `/survey/find_pool.html?poolId=${poolId}`);

            // Overflow menu for mobile
            let menuItems = [
                { label: 'Find Pool', action: () => window.location.href = `/survey/find_pool.html?poolId=${poolId}` },
                { label: '+ Atlas Visit', action: () => window.location.href = `/survey/visit_create.html?poolId=${poolId}` },
            ];
            if (canSurvey) {
                menuItems.push({ label: '+ Monitoring Survey', action: () => window.location.href = `/survey/survey_create.html?poolId=${poolId}` });
            }
            if (isAdmin) {
                menuItems.unshift({ label: 'Edit Pool', action: () => window.location.href = `pool_create.html?poolId=${poolId}` });
            }
            initOverflowMenu('action_menu_btn', 'action_menu_panel', menuItems);
        });

        function renderPoolInfo(pool) {
            if (!pool) return;
            let html = `<table class="pool-table" style="font-size:15px;">
                <tr><td><strong>Pool ID</strong></td><td>${pool.mappedPoolId || ''}</td></tr>
                <tr><td><strong>Status</strong></td><td>${pool.poolStatus || pool.mappedPoolStatus || ''}</td></tr>
                <tr><td><strong>Town</strong></td><td>${pool.townName || pool.mappedTownName || ''}</td></tr>
                <tr><td><strong>County</strong></td><td>${pool.countyName || pool.mappedCountyName || ''}</td></tr>
                <tr><td><strong>Method</strong></td><td>${pool.mappedMethod || ''}</td></tr>
                <tr><td><strong>Observer</strong></td><td>${pool.mappedObserverUserName || ''}</td></tr>
                <tr><td><strong>Date</strong></td><td>${formatDate(pool.mappedDateText || pool.mappedDate)}</td></tr>
                <tr><td><strong>Location</strong></td><td>${pool.mappedLatitude ? Number(pool.mappedLatitude).toFixed(5) + ', ' + Number(pool.mappedLongitude).toFixed(5) : ''}</td></tr>
                <tr><td><strong>Comments</strong></td><td>${pool.mappedComments || ''}</td></tr>
            </table>`;
            html += `<div id="landowner_info"></div>`;
            document.getElementById('pool_info').innerHTML = html;
        }

        async function loadLandownerInfo(pool) {
            let lat = parseFloat(pool.mappedLatitude || pool.latitude);
            let lng = parseFloat(pool.mappedLongitude || pool.longitude);
            if (isNaN(lat) || isNaN(lng)) return;

            let parcel = findParcelAtPoint(lng, lat);
            if (!parcel) {
                try {
                    await prefetchParcelsNear(lat, lng);
                    parcel = findParcelAtPoint(lng, lat);
                } catch (e) {}
            }
            if (!parcel) return;

            let p = parcel.properties || {};
            let html = `<h5 style="margin-top:12px;"><i class="fa fa-home" style="margin-right:4px;"></i>Landowner</h5>
                <table class="pool-table" style="font-size:15px;">`;
            if (p.OWNER1) html += `<tr><td><strong>Owner</strong></td><td>${p.OWNER1}</td></tr>`;
            if (p.OWNER2) html += `<tr><td><strong></strong></td><td>${p.OWNER2}</td></tr>`;
            if (p.E911ADDR) html += `<tr><td><strong>Address</strong></td><td>${p.E911ADDR}</td></tr>`;
            if (p.LOCAPROP) html += `<tr><td><strong>Location</strong></td><td>${p.LOCAPROP}</td></tr>`;
            if (p.TNAME || p.TOWN) html += `<tr><td><strong>Town</strong></td><td>${p.TNAME || p.TOWN}</td></tr>`;
            if (p.ACRESGL) html += `<tr><td><strong>Acres</strong></td><td>${p.ACRESGL.toFixed(1)}</td></tr>`;
            if (p.DESCPROP) html += `<tr><td><strong>Property</strong></td><td>${p.DESCPROP}</td></tr>`;
            if (p.REAL_FLV) html += `<tr><td><strong>Assessed Value</strong></td><td>$${p.REAL_FLV.toLocaleString()}</td></tr>`;
            if (p.SPAN) html += `<tr><td><strong>SPAN</strong></td><td>${p.SPAN}</td></tr>`;
            if (p.PARCID) html += `<tr><td><strong>Parcel ID</strong></td><td>${p.PARCID}</td></tr>`;
            html += `</table>`;

            let el = document.getElementById('landowner_info');
            if (el) el.innerHTML = html;
        }

        function findParcelAtPoint(x, y) {
            let parcels = getCachedParcels();
            for (let feature of parcels) {
                if (pointInFeature(x, y, feature)) return feature;
            }
            return null;
        }

        function pointInFeature(x, y, feature) {
            let geom = feature.geometry;
            if (!geom) return false;
            if (geom.type === 'Polygon') return pointInRings(x, y, geom.coordinates);
            if (geom.type === 'MultiPolygon') {
                for (let poly of geom.coordinates) { if (pointInRings(x, y, poly)) return true; }
            }
            return false;
        }

        function pointInRings(x, y, rings) {
            let ring = rings[0];
            if (!ring || ring.length < 3) return false;
            let inside = false;
            for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                let xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
                if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
            }
            return inside;
        }

        // ---- Sorting ----
        let sortState = {}; // keyed by table name: { col, asc }

        function sortRows(rows, col, asc) {
            return [...rows].sort((a, b) => {
                let va = (a[col] ?? '').toString();
                let vb = (b[col] ?? '').toString();
                // Date-like columns: compare as dates
                if (col.toLowerCase().includes('date')) {
                    va = va ? new Date(va).getTime() : 0;
                    vb = vb ? new Date(vb).getTime() : 0;
                    return asc ? va - vb : vb - va;
                }
                // Numeric IDs
                if (!isNaN(va) && !isNaN(vb) && va !== '' && vb !== '') {
                    return asc ? Number(va) - Number(vb) : Number(vb) - Number(va);
                }
                va = va.toLowerCase(); vb = vb.toLowerCase();
                if (va < vb) return asc ? -1 : 1;
                if (va > vb) return asc ? 1 : -1;
                return 0;
            });
        }

        function sortIndicator(tableName, col) {
            let s = sortState[tableName];
            if (!s || s.col !== col) return '';
            return s.asc ? ' <i class="fa fa-caret-up"></i>' : ' <i class="fa fa-caret-down"></i>';
        }

        function wireSort(containerEl, tableName, rows, renderFn) {
            containerEl.querySelectorAll('th[data-col]').forEach(th => {
                th.style.cursor = 'pointer';
                th.addEventListener('click', () => {
                    let col = th.dataset.col;
                    let s = sortState[tableName];
                    if (s && s.col === col) { s.asc = !s.asc; }
                    else { sortState[tableName] = { col, asc: false }; }
                    renderFn(sortRows(rows, col, sortState[tableName].asc));
                });
            });
        }

        // ---- Visits ----
        function renderVisits(rows) {
            // Default sort by date desc on first render
            if (!sortState.visits) { sortState.visits = { col: 'visitDate', asc: false }; }
            rows = sortRows(rows, sortState.visits.col, sortState.visits.asc);

            document.getElementById('visits_title').textContent = `Visits (${rows.length})`;
            if (!rows.length) {
                document.getElementById('visits_table').innerHTML = '<p style="font-size:14px;">No visits recorded.</p>';
                return;
            }
            let html = `<table class="pool-table"><thead><tr>
                <th data-col="visitId">Visit ID${sortIndicator('visits','visitId')}</th>
                <th data-col="visitDate">Date${sortIndicator('visits','visitDate')}</th>
                <th data-col="visitObserverUserName">Observer${sortIndicator('visits','visitObserverUserName')}</th>
                <th data-col="visitLocatePool">Pool Located${sortIndicator('visits','visitLocatePool')}</th>
            </tr></thead><tbody>`;
            rows.forEach(v => {
                html += `<tr class="pool-row" style="cursor:pointer;" onclick="window.location.href='visit_view.html?visitId=${v.visitId}'">
                    <td>${v.visitId || ''}</td>
                    <td>${formatDate(v.visitDate)}</td>
                    <td>${v.visitObserverUserName || v.visitUserName || ''}</td>
                    <td>${v.visitLocatePool || ''}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            let container = document.getElementById('visits_table');
            container.innerHTML = html;
            wireSort(container, 'visits', rows, renderVisits);
        }

        // ---- Surveys ----
        function renderSurveys(rows) {
            if (!sortState.surveys) { sortState.surveys = { col: 'surveyDate', asc: false }; }
            rows = sortRows(rows, sortState.surveys.col, sortState.surveys.asc);

            document.getElementById('surveys_title').textContent = `Surveys (${rows.length})`;
            if (!rows.length) {
                document.getElementById('surveys_table').innerHTML = '<p style="font-size:14px;">No monitoring surveys recorded.</p>';
                return;
            }
            let html = `<table class="pool-table"><thead><tr>
                <th data-col="surveyId">Survey ID${sortIndicator('surveys','surveyId')}</th>
                <th data-col="surveyDate">Date${sortIndicator('surveys','surveyDate')}</th>
                <th data-col="surveyTypeName">Type${sortIndicator('surveys','surveyTypeName')}</th>
                <th data-col="surveyUserName">Observer${sortIndicator('surveys','surveyUserName')}</th>
            </tr></thead><tbody>`;
            rows.forEach(s => {
                html += `<tr class="pool-row" style="cursor:pointer;" onclick="window.location.href='survey_view.html?surveyId=${s.surveyId}'">
                    <td>${s.surveyId || ''}</td>
                    <td>${formatDate(s.surveyDate)}</td>
                    <td>${s.surveyTypeName || ''}</td>
                    <td>${s.surveyUserName || ''}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            let container = document.getElementById('surveys_table');
            container.innerHTML = html;
            wireSort(container, 'surveys', rows, renderSurveys);
        }

        // ---- Reviews ----
        function renderReviews(rows, offline = false) {
            if (!sortState.reviews) { sortState.reviews = { col: 'reviewQADate', asc: false }; }
            rows = sortRows(rows, sortState.reviews.col, sortState.reviews.asc);

            document.getElementById('reviews_title').textContent = `Reviews (${rows.length})`;
            if (!rows.length) {
                let msg = offline ? 'Reviews unavailable offline.' : 'No reviews.';
                document.getElementById('reviews_table').innerHTML = `<p style="font-size:14px;">${msg}</p>`;
                return;
            }
            let html = `<table class="pool-table"><thead><tr>
                <th data-col="reviewId">Review ID${sortIndicator('reviews','reviewId')}</th>
                <th data-col="reviewQACode">QA Code${sortIndicator('reviews','reviewQACode')}</th>
                <th data-col="reviewQAPerson">QA Person${sortIndicator('reviews','reviewQAPerson')}</th>
                <th data-col="reviewQADate">Date${sortIndicator('reviews','reviewQADate')}</th>
                <th data-col="reviewStatus">Status${sortIndicator('reviews','reviewStatus')}</th>
            </tr></thead><tbody>`;
            rows.forEach(r => {
                html += `<tr class="pool-row" style="cursor:pointer;" onclick="window.location.href='/admin/review_view.html?reviewId=${r.reviewId}'">
                    <td>${r.reviewId || ''}</td>
                    <td>${r.reviewQACode || ''}</td>
                    <td>${r.reviewQAPerson || ''}</td>
                    <td>${formatDate(r.reviewQADate)}</td>
                    <td>${r.reviewStatus || ''}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            let container = document.getElementById('reviews_table');
            container.innerHTML = html;
            wireSort(container, 'reviews', rows, renderReviews);
        }

        async function initPoolMap(pool, surveyLevel = 'potential') {
            if (!pool || !pool.mappedLatitude) return;
            let lat = Number(pool.mappedLatitude);
            let lng = Number(pool.mappedLongitude);
            let map = await createMap('map', { center: [lat, lng], zoom: 16 });
            poolMap = map;
            let status = pool.poolStatus || pool.mappedPoolStatus || 'Potential';
            let town = pool.townName || pool.mappedTownName || '';
            addPoolMarker(map, [lat, lng], {
                status: status,
                surveyLevel: surveyLevel,
                size: 22,
                tooltip: `${pool.mappedPoolId} — ${status}${town ? ', ' + town : ''}`,
                popup: `Pool ${pool.mappedPoolId} — ${status}`
            });
            let btn = document.getElementById('btn_center_pool');
            btn.style.display = 'flex';
            btn.addEventListener('click', () => map.setView([lat, lng], 16));
        }
    </script>
    <script src="/js/app.js"></script>
</body>
</html>
