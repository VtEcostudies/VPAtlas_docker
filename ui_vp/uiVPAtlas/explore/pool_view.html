<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPAtlas - Pool Detail</title>
    <link rel="stylesheet" href="/css/bootstrap_5.2.3.min.css">
    <link rel="stylesheet" href="/css/font-awesome_6.6.0.all.min.css">
    <link rel="stylesheet" href="/css/leaflet_1.9.4.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/modal.css">
    <link rel="stylesheet" href="./css/pool_list.css">
    <link rel="stylesheet" href="/css/map.css">
</head>
<body>
    <header>
        <div class="detail-header">
            <button class="exit-button" onclick="window.location.href='/explore/'">&times;</button>
            <h3 class="header-name light-foreground detail-title" id="page_title">Pool Detail</h3>
            <div class="detail-actions" style="display:flex; gap:6px;">
                <button id="btn_edit" class="action-button" style="display:none;">Edit Pool</button>
                <button id="btn_find_pool" class="action-button">Find Pool</button>
                <button id="btn_add_visit" class="action-button">+ Atlas Visit</button>
                <button id="btn_add_survey" class="action-button">+ Monitoring Survey</button>
            </div>
        </div>
    </header>
    <hr class="divider-header">

    <div class="row">
        <!-- Left: Pool info + visits + surveys -->
        <div class="col-lg-6 col-12" style="max-height:85vh; overflow-y:auto; padding:10px;">
            <!-- Pool Info -->
            <div id="pool_info"></div>

            <!-- Visits Table -->
            <hr>
            <h5 id="visits_title">Visits</h5>
            <div id="visits_table"></div>

            <!-- Surveys Table -->
            <hr>
            <h5 id="surveys_title">Surveys (Monitoring)</h5>
            <div id="surveys_table"></div>

            <!-- Reviews Table -->
            <hr>
            <h5 id="reviews_title">Reviews</h5>
            <div id="reviews_table"></div>
        </div>

        <!-- Right: Map -->
        <div class="col-lg-6 col-12" style="height:85vh; position:relative;">
            <div id="map" style="height:100%; width:100%; border-radius:var(--border-radius);"></div>
            <div id="btn_center_pool" title="Zoom to pool" style="display:none; position:absolute; top:10px; left:10px; z-index:1000;
                background:white; border:2px solid rgba(0,0,0,0.2); border-radius:4px;
                width:40px; height:40px; display:flex; align-items:center; justify-content:center;
                cursor:pointer; font-size:20px; color:#333; box-shadow:0 1px 4px rgba(0,0,0,0.2);">
                <i class="fa fa-crosshairs"></i>
            </div>
        </div>
    </div>

    <script src="/js/console_manager.js"></script>
    <script src="/js/resource_manager.js"></script>
    <script src="/js/bootstrap_5.2.3.min.js"></script>
    <script src="/js/leaflet_1.9.4.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/esri-leaflet_3.0.12.js"></script>
    <script src="/js/app_messaging.js"></script>

    <script type="module">
        import { fetchMappedPoolById, fetchVisitsByPool, fetchSurveysByPool, fetchReviews } from '/js/api.js';
        import { formatDate } from './js/utils.js';
        import { getUser } from '/js/auth.js';
        import { createMap, addPoolMarker, getPoolColor } from '/js/map_common.js';

        const params = new URLSearchParams(window.location.search);
        const poolId = params.get('poolId');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!poolId) {
                document.getElementById('pool_info').innerHTML = '<p>No pool ID specified.</p>';
                return;
            }

            document.getElementById('page_title').textContent = `Pool ${poolId}`;

            // Load pool data
            try {
                let data = await fetchMappedPoolById(poolId);
                let pool = data.rows ? data.rows[0] : data;

                // Descriptive title
                if (pool) {
                    let status = pool.poolStatus || pool.mappedPoolStatus || '';
                    let town = pool.townName || pool.mappedTownName || '';
                    let county = pool.countyName || pool.mappedCountyName || '';
                    let loc = town ? `${town}${county ? ' (' + county + ')' : ''}` : '';
                    let title = `Pool ${poolId}`;
                    if (status) title += ` — ${status}`;
                    if (loc) title += ` in ${loc}`;
                    document.getElementById('page_title').textContent = title;
                    document.title = `VPAtlas - ${title}`;
                }

                renderPoolInfo(pool);
                initPoolMap(pool);
            } catch(err) {
                document.getElementById('pool_info').innerHTML = `<p style="color:var(--danger-color);">Error: ${err.message}</p>`;
            }

            // Load visits
            try {
                let visits = await fetchVisitsByPool(poolId);
                renderVisits(visits.rows || []);
            } catch(err) { renderVisits([]); }

            // Load surveys
            try {
                let surveys = await fetchSurveysByPool(poolId);
                renderSurveys(Array.isArray(surveys) ? surveys : surveys.rows || []);
            } catch(err) { renderSurveys([]); }

            // Load reviews
            try {
                let reviews = await fetchReviews(`reviewPoolId=${poolId}`);
                renderReviews(reviews.rows || []);
            } catch(err) { renderReviews([]); }

            // Setup buttons
            let user = await getUser();
            if (user) {
                document.getElementById('btn_edit').style.display = 'inline-block';
            }
            document.getElementById('btn_edit').addEventListener('click', () =>
                window.location.href = `pool_create.html?poolId=${poolId}`);
            document.getElementById('btn_add_visit').addEventListener('click', () =>
                window.location.href = `/survey/visit_create.html?poolId=${poolId}`);
            document.getElementById('btn_add_survey').addEventListener('click', () =>
                window.location.href = `/survey/survey_create.html?poolId=${poolId}`);
            document.getElementById('btn_find_pool').addEventListener('click', () =>
                window.location.href = `/survey/survey_start.html?poolId=${poolId}`);
        });

        function renderPoolInfo(pool) {
            if (!pool) return;
            let html = `<table class="pool-table" style="font-size:15px;">
                <tr><td><strong>Pool ID</strong></td><td>${pool.mappedPoolId || ''}</td></tr>
                <tr><td><strong>Status</strong></td><td>${pool.poolStatus || pool.mappedPoolStatus || ''}</td></tr>
                <tr><td><strong>Town</strong></td><td>${pool.townName || pool.mappedTownName || ''}</td></tr>
                <tr><td><strong>County</strong></td><td>${pool.countyName || pool.mappedCountyName || ''}</td></tr>
                <tr><td><strong>Method</strong></td><td>${pool.mappedMethod || ''}</td></tr>
                <tr><td><strong>Confidence</strong></td><td>${pool.mappedConfidence || ''}</td></tr>
                <tr><td><strong>Observer</strong></td><td>${pool.mappedObserverUserName || ''}</td></tr>
                <tr><td><strong>Date</strong></td><td>${formatDate(pool.mappedDateText || pool.mappedDate)}</td></tr>
                <tr><td><strong>Location</strong></td><td>${pool.mappedLatitude ? Number(pool.mappedLatitude).toFixed(5) + ', ' + Number(pool.mappedLongitude).toFixed(5) : ''}</td></tr>
                <tr><td><strong>Comments</strong></td><td>${pool.mappedComments || ''}</td></tr>
            </table>`;
            document.getElementById('pool_info').innerHTML = html;
        }

        // ---- Sorting ----
        let sortState = {}; // keyed by table name: { col, asc }

        function sortRows(rows, col, asc) {
            return [...rows].sort((a, b) => {
                let va = (a[col] ?? '').toString();
                let vb = (b[col] ?? '').toString();
                // Date-like columns: compare as dates
                if (col.toLowerCase().includes('date')) {
                    va = va ? new Date(va).getTime() : 0;
                    vb = vb ? new Date(vb).getTime() : 0;
                    return asc ? va - vb : vb - va;
                }
                // Numeric IDs
                if (!isNaN(va) && !isNaN(vb) && va !== '' && vb !== '') {
                    return asc ? Number(va) - Number(vb) : Number(vb) - Number(va);
                }
                va = va.toLowerCase(); vb = vb.toLowerCase();
                if (va < vb) return asc ? -1 : 1;
                if (va > vb) return asc ? 1 : -1;
                return 0;
            });
        }

        function sortIndicator(tableName, col) {
            let s = sortState[tableName];
            if (!s || s.col !== col) return '';
            return s.asc ? ' <i class="fa fa-caret-up"></i>' : ' <i class="fa fa-caret-down"></i>';
        }

        function wireSort(containerEl, tableName, rows, renderFn) {
            containerEl.querySelectorAll('th[data-col]').forEach(th => {
                th.style.cursor = 'pointer';
                th.addEventListener('click', () => {
                    let col = th.dataset.col;
                    let s = sortState[tableName];
                    if (s && s.col === col) { s.asc = !s.asc; }
                    else { sortState[tableName] = { col, asc: false }; }
                    renderFn(sortRows(rows, col, sortState[tableName].asc));
                });
            });
        }

        // ---- Visits ----
        function renderVisits(rows) {
            // Default sort by date desc on first render
            if (!sortState.visits) { sortState.visits = { col: 'visitDate', asc: false }; }
            rows = sortRows(rows, sortState.visits.col, sortState.visits.asc);

            document.getElementById('visits_title').textContent = `Visits (${rows.length})`;
            if (!rows.length) {
                document.getElementById('visits_table').innerHTML = '<p style="font-size:14px;">No visits recorded.</p>';
                return;
            }
            let html = `<table class="pool-table"><thead><tr>
                <th data-col="visitId">Visit ID${sortIndicator('visits','visitId')}</th>
                <th data-col="visitDate">Date${sortIndicator('visits','visitDate')}</th>
                <th data-col="visitObserverUserName">Observer${sortIndicator('visits','visitObserverUserName')}</th>
                <th data-col="visitLocatePool">Pool Located${sortIndicator('visits','visitLocatePool')}</th>
            </tr></thead><tbody>`;
            rows.forEach(v => {
                html += `<tr class="pool-row" style="cursor:pointer;" onclick="window.location.href='visit_view.html?visitId=${v.visitId}'">
                    <td>${v.visitId || ''}</td>
                    <td>${formatDate(v.visitDate)}</td>
                    <td>${v.visitObserverUserName || v.visitUserName || ''}</td>
                    <td>${v.visitLocatePool || ''}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            let container = document.getElementById('visits_table');
            container.innerHTML = html;
            wireSort(container, 'visits', rows, renderVisits);
        }

        // ---- Surveys ----
        function renderSurveys(rows) {
            if (!sortState.surveys) { sortState.surveys = { col: 'surveyDate', asc: false }; }
            rows = sortRows(rows, sortState.surveys.col, sortState.surveys.asc);

            document.getElementById('surveys_title').textContent = `Surveys (${rows.length})`;
            if (!rows.length) {
                document.getElementById('surveys_table').innerHTML = '<p style="font-size:14px;">No monitoring surveys recorded.</p>';
                return;
            }
            let html = `<table class="pool-table"><thead><tr>
                <th data-col="surveyId">Survey ID${sortIndicator('surveys','surveyId')}</th>
                <th data-col="surveyDate">Date${sortIndicator('surveys','surveyDate')}</th>
                <th data-col="surveyTypeName">Type${sortIndicator('surveys','surveyTypeName')}</th>
                <th data-col="surveyUserName">Observer${sortIndicator('surveys','surveyUserName')}</th>
            </tr></thead><tbody>`;
            rows.forEach(s => {
                html += `<tr class="pool-row" style="cursor:pointer;" onclick="window.location.href='survey_view.html?surveyId=${s.surveyId}'">
                    <td>${s.surveyId || ''}</td>
                    <td>${formatDate(s.surveyDate)}</td>
                    <td>${s.surveyTypeName || ''}</td>
                    <td>${s.surveyUserName || ''}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            let container = document.getElementById('surveys_table');
            container.innerHTML = html;
            wireSort(container, 'surveys', rows, renderSurveys);
        }

        // ---- Reviews ----
        function renderReviews(rows) {
            if (!sortState.reviews) { sortState.reviews = { col: 'reviewQADate', asc: false }; }
            rows = sortRows(rows, sortState.reviews.col, sortState.reviews.asc);

            document.getElementById('reviews_title').textContent = `Reviews (${rows.length})`;
            if (!rows.length) {
                document.getElementById('reviews_table').innerHTML = '<p style="font-size:14px;">No reviews.</p>';
                return;
            }
            let html = `<table class="pool-table"><thead><tr>
                <th data-col="reviewId">Review ID${sortIndicator('reviews','reviewId')}</th>
                <th data-col="reviewQACode">QA Code${sortIndicator('reviews','reviewQACode')}</th>
                <th data-col="reviewQAPerson">QA Person${sortIndicator('reviews','reviewQAPerson')}</th>
                <th data-col="reviewQADate">Date${sortIndicator('reviews','reviewQADate')}</th>
                <th data-col="reviewStatus">Status${sortIndicator('reviews','reviewStatus')}</th>
            </tr></thead><tbody>`;
            rows.forEach(r => {
                html += `<tr class="pool-row" style="cursor:pointer;" onclick="window.location.href='/admin/review_view.html?reviewId=${r.reviewId}'">
                    <td>${r.reviewId || ''}</td>
                    <td>${r.reviewQACode || ''}</td>
                    <td>${r.reviewQAPerson || ''}</td>
                    <td>${formatDate(r.reviewQADate)}</td>
                    <td>${r.reviewStatus || ''}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            let container = document.getElementById('reviews_table');
            container.innerHTML = html;
            wireSort(container, 'reviews', rows, renderReviews);
        }

        async function initPoolMap(pool) {
            if (!pool || !pool.mappedLatitude) return;
            let lat = Number(pool.mappedLatitude);
            let lng = Number(pool.mappedLongitude);
            let map = await createMap('map', { center: [lat, lng], zoom: 16 });
            let status = pool.poolStatus || pool.mappedPoolStatus || 'Potential';
            let town = pool.townName || pool.mappedTownName || '';
            addPoolMarker(map, [lat, lng], {
                status: status,
                surveyLevel: 'potential',
                size: 22,
                tooltip: `${pool.mappedPoolId} — ${status}${town ? ', ' + town : ''}`,
                popup: `Pool ${pool.mappedPoolId} — ${status}`
            });
            let btn = document.getElementById('btn_center_pool');
            btn.style.display = 'flex';
            btn.addEventListener('click', () => map.setView([lat, lng], 16));
        }
    </script>
    <script src="/js/app.js"></script>
</body>
</html>
