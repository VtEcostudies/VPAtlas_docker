<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPAtlas - Register</title>
    <link rel="stylesheet" href="/css/bootstrap_5.2.3.min.css">
    <link rel="stylesheet" href="/css/font-awesome_6.6.0.all.min.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>
    <div class="container-fluid" style="height: 100%; min-height: 100vh;">
        <div class="row">
            <div class="col-lg-6 offset-lg-3 col-12">
                <header>
                    <div class="row controls">
                        <div class="col-12 header-title-info">
                            <h2 class="header-title light-foreground">VPAtlas Registration</h2>
                        </div>
                    </div>
                </header>
                <hr class="divider-header">

                <div id="message" class="auth-message"></div>

                <form id="register_form" onsubmit="return false;">
                    <div class="row">
                        <div class="col-lg-6">
                            <label for="firstname">First Name</label>
                            <input type="text" id="firstname" name="firstname" required style="width:100%">
                        </div>
                        <div class="col-lg-6">
                            <label for="lastname">Last Name</label>
                            <input type="text" id="lastname" name="lastname" required style="width:100%">
                        </div>
                    </div>
                    <div class="row" style="margin-top:10px;">
                        <div class="col-lg-12">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" required style="width:100%">
                        </div>
                    </div>
                    <div class="row" style="margin-top:10px;">
                        <div class="col-lg-12">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required style="width:100%">
                        </div>
                    </div>
                    <div class="row" style="margin-top:10px;">
                        <div class="col-lg-6">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required style="width:100%">
                        </div>
                        <div class="col-lg-6">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required style="width:100%">
                        </div>
                    </div>

                    <div class="button-container">
                        <button type="button" onclick="window.location.href='/explore/login.html'">Cancel</button>
                        <button type="submit" class="default-button">Register</button>
                    </div>
                </form>

                <hr>
                <div class="auth-links">
                    <a href="./login.html">Already have an account? Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/bootstrap_5.2.3.min.js"></script>
    <script type="module">
        import { registerUser } from '/js/auth.js';

        const form = document.getElementById('register_form');
        const message = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            let password = document.getElementById('password').value;
            let confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                message.textContent = 'Passwords do not match.';
                message.className = 'auth-message error';
                return;
            }

            message.textContent = 'Registering...';
            message.className = 'auth-message info';

            try {
                let body = {
                    firstname: document.getElementById('firstname').value,
                    lastname: document.getElementById('lastname').value,
                    username: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    password: password
                };
                let res = await registerUser(body);
                message.textContent = 'Registration successful! Check your email to confirm.';
                message.className = 'auth-message success';
            } catch(err) {
                message.textContent = err.message || 'Registration failed.';
                message.className = 'auth-message error';
            }
        });
    </script>
</body>
</html>
