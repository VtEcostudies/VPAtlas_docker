<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPAtlas - Map Pool</title>
    <link rel="stylesheet" href="/css/bootstrap_5.2.3.min.css">
    <link rel="stylesheet" href="/css/font-awesome_6.6.0.all.min.css">
    <link rel="stylesheet" href="/css/leaflet_1.9.4.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/modal.css">
    <link rel="stylesheet" href="/css/map.css">
</head>
<body>
    <header>
        <div class="detail-header">
            <a class="home-button" href="/explore/" title="Home"><i class="fa fa-house"></i></a>
            <button class="exit-button" onclick="history.back()" title="Back">&times;</button>
            <h3 class="header-name light-foreground detail-title" id="page_title">Map a Vernal Pool</h3>
            <button id="btn_save" class="action-button" style="font-size:14px; padding:4px 12px;">Save</button>
            <div id="profile_container" style="margin-left:auto;"></div>
        </div>
    </header>
    <hr class="divider-header">

    <div id="message" class="auth-message" style="margin:0 10px;"></div>

    <div class="row" style="padding:10px;">
        <!-- Left: Form -->
        <div class="col-lg-6 col-12" style="max-height:85vh; overflow-y:auto;">
            <form id="pool_form" onsubmit="return false;">
                <div class="row mb-2">
                    <div class="col-6">
                        <label for="mappedPoolId">Pool ID</label>
                        <input type="text" id="mappedPoolId" style="width:100%" readonly>
                    </div>
                    <div class="col-6">
                        <label for="mappedDateText">Date</label>
                        <input type="date" id="mappedDateText" required style="width:100%">
                    </div>
                </div>
                <div class="row mb-2">
                    <div class="col-12">
                        <label for="mappedObserverUserName">Observer</label>
                        <input type="text" id="mappedObserverUserName" required readonly style="width:100%">
                    </div>
                </div>
                <div class="row mb-2">
                    <div class="col-6">
                        <label for="mappedLatitude">Latitude</label>
                        <input type="text" id="mappedLatitude" required style="width:100%" readonly placeholder="Click map">
                    </div>
                    <div class="col-6">
                        <label for="mappedLongitude">Longitude</label>
                        <input type="text" id="mappedLongitude" required style="width:100%" readonly placeholder="Click map">
                    </div>
                </div>
                <div class="row mb-2">
                    <div class="col-6">
                        <label for="townName">Town</label>
                        <input type="text" id="townName" style="width:100%" disabled>
                    </div>
                    <div class="col-6">
                        <label for="mappedLocationUncertainty">Location Uncertainty (yards)</label>
                        <select id="mappedLocationUncertainty" style="width:100%; font-size:16px;">
                            <option value="">--</option>
                            <option value="10">10</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                            <option value=">100">&gt;100</option>
                        </select>
                    </div>
                </div>
                <div class="row mb-2">
                    <div class="col-6">
                        <label for="mappedMethod">Mapped Method</label>
                        <select id="mappedMethod" style="width:100%; font-size:16px;">
                            <option value="">--</option>
                            <option value="GPS">GPS</option>
                            <option value="Heads-up Digitizing">Heads-up Digitizing</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label for="mappedPoolStatus">Pool Status</label>
                        <select id="mappedPoolStatus" style="width:100%; font-size:16px;">
                            <option value="Potential">Potential</option>
                            <option value="Probable">Probable</option>
                            <option value="Confirmed">Confirmed</option>
                            <option value="Duplicate">Duplicate</option>
                            <option value="Eliminated">Eliminated</option>
                        </select>
                    </div>
                </div>
                <div class="row mb-2">
                    <div class="col-12">
                        <label for="mappedComments">Comments</label>
                        <textarea id="mappedComments" rows="3" style="width:100%; font-size:16px; border:1px solid var(--primary-color); border-radius:8px; padding:5px;"></textarea>
                    </div>
                </div>

            </form>
        </div>

        <!-- Right: Map -->
        <div class="col-lg-6 col-12" style="height:85vh; position:relative;">
            <div id="map" style="height:100%; width:100%; border-radius:var(--border-radius);"></div>
            <div id="btn_center" title="Zoom to pool" style="display:none; position:absolute; top:10px; left:10px; z-index:1000;
                background:white; border:2px solid rgba(0,0,0,0.2); border-radius:4px;
                width:40px; height:40px; display:flex; align-items:center; justify-content:center;
                cursor:pointer; font-size:20px; color:#333; box-shadow:0 1px 4px rgba(0,0,0,0.2);">
                <i class="fa fa-crosshairs"></i>
            </div>
        </div>
    </div>

    <script src="/js/console_manager.js"></script>
    <script src="/js/resource_manager.js"></script>
    <script src="/js/bootstrap_5.2.3.min.js"></script>
    <script src="/js/leaflet_1.9.4.js"></script>
    <script src="/js/config.js"></script>

    <script type="module">
        import { fetchMappedPoolById, createMappedPool, updateMappedPool } from '/js/api.js';
        import { getPoolById } from '/js/pool_data_cache.js';
        import { requireAuth, getUser } from '/js/auth.js';
        import { setupProfileIcon } from '/js/profile_icon.js';
        setupProfileIcon();

        const params = new URLSearchParams(window.location.search);
        const poolId = params.get('poolId');
        const isEdit = !!poolId;
        let map, marker;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!(await requireAuth())) return;

            let user = await getUser();
            if (!user || user.userrole !== 'admin') {
                document.body.innerHTML = '<div style="padding:20px; color:var(--danger-color);">Admin access required.</div>';
                return;
            }
            if (!isEdit) {
                document.getElementById('mappedObserverUserName').value = user.handle || user.username || user.email || '';
                document.getElementById('mappedDateText').value = new Date().toLocaleDateString('sv-SE');
            }

            // Init map
            map = L.map('map').setView([43.858297, -72.446594], 8);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19, attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // Click map to set location
            map.on('click', function(e) {
                setLocation(e.latlng.lat, e.latlng.lng);
            });

            // Load existing pool if editing
            if (isEdit) {
                document.getElementById('page_title').textContent = `Edit Pool ${poolId}`;
                try {
                    let data;
                    try { data = await fetchMappedPoolById(poolId); }
                    catch(e) { data = await getPoolById(poolId); }
                    let pool = data.rows ? data.rows[0] : data;
                    if (pool) {
                        let town = pool.townName || pool.mappedTownName || '';
                        let county = pool.countyName || pool.mappedCountyName || '';
                        let loc = town ? `${town}${county ? ' (' + county + ')' : ''}` : '';
                        let editTitle = `Edit Pool ${poolId}`;
                        if (loc) editTitle += ` in ${loc}`;
                        document.getElementById('page_title').textContent = editTitle;
                        document.title = `VPAtlas - ${editTitle}`;
                    }
                    populateForm(pool);
                } catch(err) {
                    showMsg('Error loading pool: ' + err.message, 'error');
                }
            }

            // Save
            document.getElementById('btn_save').addEventListener('click', async () => {
                let body = getFormData();
                showMsg('Saving...', 'info');
                try {
                    if (isEdit) {
                        await updateMappedPool(poolId, body);
                    } else {
                        await createMappedPool(body);
                    }
                    showMsg('Saved!', 'success');
                    setTimeout(() => window.location.href = isEdit ? `pool_view.html?poolId=${poolId}` : '/explore/', 1000);
                } catch(err) {
                    showMsg('Save failed: ' + (err.message || JSON.stringify(err)), 'error');
                }
            });
        });

        function setLocation(lat, lng) {
            document.getElementById('mappedLatitude').value = lat.toFixed(6);
            document.getElementById('mappedLongitude').value = lng.toFixed(6);
            if (marker) map.removeLayer(marker);
            marker = L.circleMarker([lat, lng], {
                radius: 10, fillColor: '#2c5530', color: '#333', weight: 2, fillOpacity: 0.8
            }).addTo(map);
            map.setView([lat, lng], 16);
            // Show center button
            let btn = document.getElementById('btn_center');
            if (btn) {
                btn.style.display = 'flex';
                btn.onclick = () => map.setView([lat, lng], 16);
            }
        }

        function populateForm(pool) {
            if (!pool) return;
            ['mappedPoolId','mappedDateText','mappedObserverUserName','mappedLatitude','mappedLongitude',
             'mappedLocationUncertainty','mappedMethod','mappedPoolStatus','mappedComments'].forEach(field => {
                let el = document.getElementById(field);
                if (el && pool[field] !== undefined && pool[field] !== null) el.value = pool[field];
            });
            if (pool.townName || pool.mappedTownName)
                document.getElementById('townName').value = pool.townName || pool.mappedTownName;
            if (pool.mappedLatitude && pool.mappedLongitude) {
                setLocation(Number(pool.mappedLatitude), Number(pool.mappedLongitude));
            }
        }

        function getFormData() {
            let body = {};
            ['mappedDateText','mappedObserverUserName','mappedLatitude','mappedLongitude',
             'mappedLocationUncertainty','mappedMethod','mappedPoolStatus','mappedComments'].forEach(f => {
                let el = document.getElementById(f);
                if (el) body[f] = el.value;
            });
            return body;
        }

        function showMsg(text, type) {
            let el = document.getElementById('message');
            el.textContent = text;
            el.className = 'auth-message ' + type;
        }
    </script>
    <script src="/js/app.js"></script>
</body>
</html>
