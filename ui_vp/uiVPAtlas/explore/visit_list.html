<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPAtlas - My Visits and Tracks</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2c5530">
    <link rel="stylesheet" href="/css/bootstrap_5.2.3.min.css">
    <link rel="stylesheet" href="/css/font-awesome_6.6.0.all.min.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/pool_list.css">
    <link rel="stylesheet" href="./css/modal.css">
    <link rel="stylesheet" href="/survey/css/visit_queue.css">
    <style>
        .vl-container { max-width: 750px; padding: 10px 16px; overflow-x: hidden; }
        .vl-empty { font-size: 14px; color: var(--text-muted, #666); padding: 12px 0; }
        .vl-header-row {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 6px; margin-bottom: 8px;
        }
        .vl-header-row h5 { margin: 0; font-size: 15px; }
        .vl-sort { font-size: 13px; display: flex; gap: 4px; align-items: center; }
        .vl-sort select { font-size: 13px; padding: 2px 6px; border: 1px solid #ccc; border-radius: 4px; }

        /* Tab nav for Visits / Tracks */
        .vl-tabs {
            display: flex; gap: 0; margin: 0 -16px 12px -16px; padding: 0 16px;
            border-bottom: 2px solid #e5e7eb;
        }
        .vl-tab {
            background: none; border: none; padding: 8px 16px;
            font-size: 14px; font-weight: 600; color: var(--text-muted, #666);
            border-bottom: 3px solid transparent; margin-bottom: -2px;
            cursor: pointer;
        }
        .vl-tab.active {
            color: var(--primary-color); border-bottom-color: var(--primary-color);
        }
        .vl-tab .vl-badge {
            display: inline-block; min-width: 18px; padding: 0 6px;
            background: var(--primary-color); color: white;
            border-radius: 9px; font-size: 11px; line-height: 18px;
            text-align: center; margin-left: 4px;
        }
        .vl-panel { display: none; }
        .vl-panel.active { display: block; }
        /* Track-specific list styling — reuse vq-* classes from visit_queue.css */
        .vl-track-meta { font-size: 12px; color: var(--text-muted, #666); }
        .vl-track-pending { background: #fef3c7; color: #92400e; }
        .vl-track-uploaded { background: #d1fae5; color: #065f46; }
        .vl-track-failed { background: #fee2e2; color: #991b1b; }
        .vl-track-status {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 11px; font-weight: 600; margin-right: 6px;
        }
    </style>
    <script src="/js/home_button.js" defer></script>
</head>
<body>
    <header>
        <div class="detail-header">
            <a class="home-button" href="/explore/" title="Home"><i class="fa fa-house"></i></a>
            <button class="exit-button" onclick="history.back()" title="Back">&times;</button>
            <h3 class="header-name light-foreground detail-title" id="page_title">My Visits and Tracks</h3>
            <div id="profile_container" style="margin-left:auto;"></div>
        </div>
    </header>
    <hr class="divider-header">

    <div class="vl-container">
        <div class="vl-tabs">
            <button class="vl-tab active" data-tab="visits"><i class="fa fa-inbox"></i> Visits<span class="vl-badge" id="badge_visits" style="display:none;"></span></button>
            <button class="vl-tab" data-tab="tracks"><i class="fa fa-route"></i> Tracks<span class="vl-badge" id="badge_tracks" style="display:none;"></span></button>
        </div>

        <div class="vl-panel active" id="panel_visits">
            <div class="vl-header-row">
                <h5 id="list_title"><i class="fa fa-inbox"></i> Visits</h5>
                <div class="vl-sort">
                    <label>Sort:</label>
                    <select id="sort_select">
                        <option value="date-desc">Date (newest)</option>
                        <option value="date-asc">Date (oldest)</option>
                        <option value="pool-asc">Pool ID (A-Z)</option>
                        <option value="status">Status</option>
                    </select>
                </div>
            </div>

            <div id="visit_list" class="vq-list"></div>
            <div id="visit_empty" class="vl-empty" style="display:none;">No visits found.</div>
            <div id="visit_loading" class="vl-empty"><i class="fa fa-spinner fa-spin"></i> Loading...</div>
        </div>

        <div class="vl-panel" id="panel_tracks">
            <div class="vl-header-row">
                <h5><i class="fa fa-route"></i> Tracks</h5>
                <button class="btn btn-sm btn-outline-success" id="btn_upload_all" style="display:none;">
                    <i class="fa fa-cloud-arrow-up"></i> Upload all
                </button>
            </div>
            <div id="track_list" class="vq-list"></div>
            <div id="track_empty" class="vl-empty" style="display:none;">No tracks recorded yet. Start one from PoolFinder.</div>
            <div id="track_loading" class="vl-empty"><i class="fa fa-spinner fa-spin"></i> Loading...</div>
        </div>
    </div>

    <script src="/js/console_manager.js"></script>
    <script src="/js/resource_manager.js"></script>
    <script src="/js/bootstrap_5.2.3.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/bandwidth_monitor.js"></script>
    <script src="/js/app.js"></script>

    <script type="module">
        import { fetchVisits, fetchTracks, createTrack, deleteTrack } from '/js/api.js';
        import { formatDate } from './js/utils.js';
        import { getUser } from '/js/auth.js';
        import { setupProfileIcon } from '/js/profile_icon.js';
        import { loadAllVisits, deleteVisit } from '/survey/js/visit_store.js';
        import { syncVisit } from '/survey/js/visit_sync.js';
        import { listQueue as listLocalTracks, deleteLocal as deleteLocalTrack, markUploaded as markTrackUploaded } from '/survey/js/track_recorder.js';

        setupProfileIcon('profile_container');

        let currentUser = null;
        let allVisits = [];  // unified list of local + server visits
        let allTracks = [];  // unified list of local + server tracks
        let currentSort = 'date-desc';

        document.addEventListener('DOMContentLoaded', async () => {
            currentUser = await getUser();

            if (!currentUser) {
                document.getElementById('page_title').textContent = 'Visits and Tracks (log in to see yours)';
            }

            wireTabs();
            await loadAll();
            await loadAllTracks();

            // Sort control
            document.getElementById('sort_select').addEventListener('change', (e) => {
                currentSort = e.target.value;
                renderList();
            });

            // Upload-all button
            document.getElementById('btn_upload_all').addEventListener('click', uploadAllPendingTracks);

            // Refresh on sync events
            window.addEventListener('visitSyncStatus', async (e) => {
                if (e.detail?.type === 'uploaded') await loadAll();
            });

            // Honor ?tab=tracks deep-link
            let initialTab = new URLSearchParams(location.search).get('tab');
            if (initialTab === 'tracks') activateTab('tracks');
        });

        // =====================================================================
        // Tab switching
        // =====================================================================
        function wireTabs() {
            document.querySelectorAll('.vl-tab').forEach(btn => {
                btn.addEventListener('click', () => activateTab(btn.dataset.tab));
            });
        }
        function activateTab(name) {
            document.querySelectorAll('.vl-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
            document.querySelectorAll('.vl-panel').forEach(p => p.classList.toggle('active', p.id === 'panel_' + name));
        }

        // =====================================================================
        // Load local + server visits into one unified list
        // =====================================================================
        async function loadAll() {
            let loading = document.getElementById('visit_loading');
            loading.style.display = 'block';

            // Local visits from IndexedDB
            let localVisits = [];
            try {
                let raw = await loadAllVisits();
                localVisits = raw.map(v => ({
                    source: 'local',
                    status: v.status || 'draft',
                    visit_uuid: v.visit_uuid,
                    server_visit_id: v.server_visit_id || null,
                    photos_uploaded: v.photos_uploaded,
                    visitId: v.server_visit_id || null,
                    visitPoolId: v.visitPoolId || v.formData?.visitPoolId || '',
                    visitDate: v.visitDate || v.formData?.visitDate || '',
                    visitObserverUserName: v.visitObserverUserName || v.formData?.visitObserverUserName || '',
                    townName: '',
                    poolStatus: '',
                    visitLocatePool: '',
                    last_modified: v.last_modified || v.created_at || '',
                }));
            } catch(e) { console.warn('visit_list: local load failed', e); }

            // Server visits
            let serverVisits = [];
            if (currentUser) {
                try {
                    let username = currentUser.handle || currentUser.username;
                    let data = await fetchVisits(`visitObserverUserName=${username}`);
                    let rows = data.rows || (Array.isArray(data) ? data : []);
                    // Build set of server visitIds that are also in local (uploaded from here)
                    let localServerIds = new Set(localVisits.filter(v => v.server_visit_id).map(v => v.server_visit_id));
                    serverVisits = rows
                        .filter(v => !localServerIds.has(v.visitId))  // skip dupes
                        .map(v => ({
                            source: 'server',
                            status: 'server',
                            visitId: v.visitId,
                            visitPoolId: v.visitPoolId || v.poolId || '',
                            visitDate: v.visitDate || '',
                            visitObserverUserName: v.visitObserverUserName || v.visitUserName || '',
                            townName: v.townName || '',
                            poolStatus: v.poolStatus || v.mappedPoolStatus || '',
                            visitLocatePool: v.visitLocatePool || '',
                        }));
                } catch(e) { console.warn('visit_list: server load failed', e); }
            }

            allVisits = [...localVisits, ...serverVisits];
            loading.style.display = 'none';
            renderList();
        }

        // =====================================================================
        // Render unified list
        // =====================================================================
        function renderList() {
            let container = document.getElementById('visit_list');
            let empty = document.getElementById('visit_empty');
            let title = document.getElementById('list_title');

            let sorted = sortVisits(allVisits, currentSort);
            title.innerHTML = `<i class="fa fa-inbox"></i> Visits (${sorted.length})`;

            if (!sorted.length) {
                container.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            let html = '';
            sorted.forEach(v => {
                let statusClass, statusLabel, actions;

                if (v.source === 'local') {
                    statusClass = `vq-status-${v.status}`;
                    statusLabel = v.status;
                    if (v.status === 'draft') {
                        actions = `
                            <button class="vq-btn vq-edit" data-uuid="${v.visit_uuid}" title="Edit"><i class="fa fa-pen"></i></button>
                            <button class="vq-btn vq-upload" data-uuid="${v.visit_uuid}" title="Upload"><i class="fa fa-cloud-arrow-up"></i></button>
                            <button class="vq-btn vq-delete" data-uuid="${v.visit_uuid}" title="Delete"><i class="fa fa-trash"></i></button>`;
                    } else if (v.status === 'complete') {
                        actions = `
                            <button class="vq-btn vq-upload" data-uuid="${v.visit_uuid}" title="Upload"><i class="fa fa-cloud-arrow-up"></i></button>
                            <button class="vq-btn vq-delete" data-uuid="${v.visit_uuid}" title="Delete"><i class="fa fa-trash"></i></button>`;
                    } else {
                        // uploaded from this device
                        let photoNote = (v.photos_uploaded === false) ? ' <i class="fa fa-image" title="Photos pending"></i>' : '';
                        actions = `<span class="vq-btn" style="color:#2e7d32; border:none;"><i class="fa fa-check"></i>${photoNote}</span>`;
                    }
                } else {
                    // server visit
                    statusClass = 'vq-status-uploaded';
                    statusLabel = 'server';
                    actions = `<a class="vq-btn" href="visit_view.html?visitId=${v.visitId}" title="View"><i class="fa fa-eye"></i></a>`;
                }

                let poolLink = v.visitPoolId
                    ? `<a href="pool_view.html?poolId=${v.visitPoolId}" style="color:inherit; text-decoration:underline;">${v.visitPoolId}</a>`
                    : '—';
                let dateStr = formatDate(v.visitDate);
                let detail = [dateStr, v.townName].filter(Boolean).join(' — ');
                let idStr = v.visitId ? `#${v.visitId}` : '';

                html += `<div class="vq-item">
                    <div class="vq-info">
                        <div><span class="vq-status ${statusClass}">${statusLabel}</span> ${poolLink} <span style="color:var(--text-muted); font-size:12px;">${idStr}</span></div>
                        <div class="vq-date">${detail}${v.visitObserverUserName ? ' — ' + v.visitObserverUserName : ''}</div>
                    </div>
                    <div class="vq-actions">${actions}</div>
                </div>`;
            });

            container.innerHTML = html;
            wireActions(container);
        }

        // =====================================================================
        // Wire action buttons
        // =====================================================================
        function wireActions(container) {
            container.querySelectorAll('.vq-edit').forEach(btn => {
                btn.addEventListener('click', () => {
                    window.location.href = `/survey/visit_create.html?local=${btn.dataset.uuid}`;
                });
            });

            container.querySelectorAll('.vq-upload').forEach(btn => {
                btn.addEventListener('click', async () => {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i>';
                    await syncVisit(btn.dataset.uuid);
                    await loadAll();
                });
            });

            container.querySelectorAll('.vq-delete').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (confirm('Delete this saved visit?')) {
                        await deleteVisit(btn.dataset.uuid);
                        await loadAll();
                    }
                });
            });
        }

        // =====================================================================
        // Tracks: load local queue + server-side tracks (own + all-for-admin),
        // merge by remoteId, render, wire upload/delete.
        // =====================================================================
        async function loadAllTracks() {
            let loading = document.getElementById('track_loading');
            loading.style.display = 'block';

            // Local queue (recorded but not yet uploaded, plus already-uploaded
            // tracks that the user hasn't cleared from local).
            let local = [];
            try { local = await listLocalTracks(); } catch(e) { console.warn('tracks: local load failed', e); }

            // Server-side tracks (filtered to current user by API; admins can
            // see ?scope=all but we keep this page personal — admin global view
            // belongs in the admin panel).
            let serverRows = [];
            if (currentUser) {
                try {
                    let resp = await fetchTracks();
                    serverRows = resp.rows || [];
                } catch(e) { console.warn('tracks: server load failed', e); }
            }

            // Merge: any local with a remoteId is the same row as the server's
            // matching trackId — prefer local (it carries the geometry).
            let serverIds = new Set(local.filter(t => t.remoteId).map(t => t.remoteId));
            let serverOnly = serverRows.filter(r => !serverIds.has(r.trackId));

            allTracks = [
                ...local.map(t => ({
                    source: 'local',
                    localId: t.localId,
                    remoteId: t.remoteId || null,
                    name: t.name,
                    notes: t.notes,
                    startedAt: t.startedAt,
                    endedAt: t.endedAt,
                    pointCount: t.points?.length || 0,
                    lengthM: null,
                    uploadedAt: t.uploadedAt,
                    accuracyMinM: t.accuracyMinM
                })),
                ...serverOnly.map(r => ({
                    source: 'server',
                    localId: null,
                    remoteId: r.trackId,
                    name: r.name,
                    notes: r.notes,
                    startedAt: r.startedAt,
                    endedAt: r.endedAt,
                    pointCount: r.pointCount,
                    lengthM: r.lengthM,
                    uploadedAt: r.uploadedAt
                }))
            ];

            // Sort newest first by startedAt
            allTracks.sort((a, b) => (b.startedAt || '').localeCompare(a.startedAt || ''));

            loading.style.display = 'none';
            renderTracks();
        }

        function renderTracks() {
            let container = document.getElementById('track_list');
            let empty = document.getElementById('track_empty');
            let badge = document.getElementById('badge_tracks');
            let uploadAllBtn = document.getElementById('btn_upload_all');

            badge.textContent = allTracks.length;
            badge.style.display = allTracks.length ? '' : 'none';

            let pending = allTracks.filter(t => t.source === 'local' && !t.remoteId);
            uploadAllBtn.style.display = pending.length > 1 ? '' : 'none';

            if (!allTracks.length) {
                container.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            let html = '';
            allTracks.forEach(t => {
                let statusClass, statusLabel, actions;
                if (t.source === 'local' && !t.remoteId) {
                    statusClass = 'vl-track-pending';
                    statusLabel = 'queued';
                    actions = `
                        <button class="vq-btn track-upload" data-local="${t.localId}" title="Upload"><i class="fa fa-cloud-arrow-up"></i></button>
                        <button class="vq-btn track-delete-local" data-local="${t.localId}" title="Delete locally"><i class="fa fa-trash"></i></button>`;
                } else if (t.source === 'local' && t.remoteId) {
                    statusClass = 'vl-track-uploaded';
                    statusLabel = 'uploaded';
                    actions = `<button class="vq-btn track-delete-local" data-local="${t.localId}" title="Remove from device"><i class="fa fa-trash"></i></button>`;
                } else {
                    statusClass = 'vl-track-uploaded';
                    statusLabel = 'server';
                    actions = `<button class="vq-btn track-delete-remote" data-remote="${t.remoteId}" title="Delete from server"><i class="fa fa-trash"></i></button>`;
                }

                let dateStr = t.startedAt ? new Date(t.startedAt).toLocaleString() : '';
                let durationMin = t.startedAt && t.endedAt
                    ? Math.round((new Date(t.endedAt) - new Date(t.startedAt)) / 60000)
                    : null;
                let lengthStr = t.lengthM != null ? `${(t.lengthM/1000).toFixed(2)} km` : '';
                let detail = [
                    `${t.pointCount} pts`,
                    durationMin ? `${durationMin} min` : '',
                    lengthStr
                ].filter(Boolean).join(' · ');

                html += `<div class="vq-item">
                    <div class="vq-info">
                        <div><span class="vl-track-status ${statusClass}">${statusLabel}</span> ${t.name || 'Track'} ${t.remoteId ? `<span style="color:var(--text-muted); font-size:12px;">#${t.remoteId}</span>` : ''}</div>
                        <div class="vl-track-meta">${dateStr}${detail ? ' — ' + detail : ''}</div>
                    </div>
                    <div class="vq-actions">${actions}</div>
                </div>`;
            });

            container.innerHTML = html;
            wireTrackActions(container);
        }

        function wireTrackActions(container) {
            container.querySelectorAll('.track-upload').forEach(btn => {
                btn.addEventListener('click', async () => {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i>';
                    await uploadOneTrack(btn.dataset.local);
                });
            });
            container.querySelectorAll('.track-delete-local').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (!confirm('Remove this track from this device? (Server copy, if any, is not affected.)')) return;
                    await deleteLocalTrack(btn.dataset.local);
                    await loadAllTracks();
                });
            });
            container.querySelectorAll('.track-delete-remote').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (!confirm('Permanently delete this track from the server?')) return;
                    try { await deleteTrack(btn.dataset.remote); }
                    catch(e) {
                        console.error('Track delete failed', e);
                        alert(`Delete failed: ${describeError(e)}\n\nTrack #${btn.dataset.remote}`);
                    }
                    await loadAllTracks();
                });
            });
        }

        // Mobile-only debugging means we can't open devtools, so every error
        // alert needs to surface as much detail as possible. This walks the
        // common shapes thrown from /js/api.js (parsed JSON bodies, fetch
        // TypeErrors, hand-thrown {message, status, ...} objects, raw strings)
        // and ends with a JSON.stringify fallback so no error becomes the
        // useless "[object Object]".
        function describeError(e) {
            if (e == null) return '(no error info)';
            if (typeof e === 'string') return e;
            let parts = [];
            if (e.status) parts.push(`HTTP ${e.status}`);
            if (e.name && e.name !== 'Error') parts.push(e.name);
            if (typeof e.message === 'string' && e.message) parts.push(e.message);
            if (typeof e.error === 'string' && e.error) parts.push(`error=${e.error}`);
            if (e.detail) parts.push(`detail=${typeof e.detail === 'string' ? e.detail : JSON.stringify(e.detail)}`);
            if (e.hint) parts.push(`hint=${e.hint}`);
            if (e.code) parts.push(`code=${e.code}`);
            if (e.constraint) parts.push(`constraint=${e.constraint}`);
            if (e.column) parts.push(`column=${e.column}`);
            if (e.routine) parts.push(`routine=${e.routine}`);
            if (e.query) parts.push(`url=${e.query}`);
            if (parts.length === 0) {
                try {
                    let s = JSON.stringify(e);
                    if (s && s !== '{}') return s;
                } catch(_) {}
                // Fallback: enumerate own properties
                try {
                    let pairs = Object.getOwnPropertyNames(e).map(k => {
                        let v = e[k];
                        if (typeof v === 'function') return null;
                        try { return `${k}=${typeof v === 'object' ? JSON.stringify(v) : String(v)}`; }
                        catch(_) { return `${k}=?`; }
                    }).filter(Boolean);
                    if (pairs.length) return pairs.join(' | ');
                } catch(_) {}
                return String(e);
            }
            return parts.join(' — ');
        }

        async function uploadOneTrack(localId) {
            let local = (await listLocalTracks()).find(t => t.localId === localId);
            if (!local) {
                alert(`Upload failed: track ${localId} not found in local queue (was it already deleted?)`);
                return;
            }
            // Pre-flight sanity check with descriptive errors so we don't
            // round-trip the server with a known-bad payload.
            let pts = Array.isArray(local.points) ? local.points : [];
            if (pts.length < 2) {
                alert(`Upload failed: track has only ${pts.length} point(s) — need at least 2.`);
                return;
            }
            let bad = pts.findIndex(p =>
                !Array.isArray(p) || p.length < 2 ||
                !Number.isFinite(p[0]) || !Number.isFinite(p[1])
            );
            if (bad !== -1) {
                alert(`Upload failed: point #${bad} is not a finite [lng, lat]. Got: ${JSON.stringify(pts[bad])}`);
                return;
            }
            try {
                let result = await createTrack({
                    name: local.name,
                    notes: local.notes,
                    startedAt: local.startedAt,
                    endedAt: local.endedAt,
                    points: pts
                });
                if (result && result.trackId) {
                    await markTrackUploaded(localId, result.trackId);
                } else {
                    alert(`Upload returned no trackId. Server response: ${JSON.stringify(result || null)}`);
                }
            } catch(e) {
                console.error('Track upload failed', e);
                alert(`Upload failed: ${describeError(e)}\n\n` +
                      `Track: ${localId}\n` +
                      `Points: ${pts.length}\n` +
                      `Started: ${local.startedAt}\n` +
                      `Ended: ${local.endedAt || '(none)'}`);
            }
            await loadAllTracks();
        }

        async function uploadAllPendingTracks() {
            let pending = (await listLocalTracks()).filter(t => !t.remoteId);
            for (let t of pending) {
                await uploadOneTrack(t.localId);
            }
        }

        // =====================================================================
        // Sort
        // =====================================================================
        function sortVisits(list, mode) {
            let sorted = [...list];
            switch (mode) {
                case 'date-asc':
                    sorted.sort((a, b) => (a.visitDate || '').localeCompare(b.visitDate || ''));
                    break;
                case 'date-desc':
                    sorted.sort((a, b) => (b.visitDate || '').localeCompare(a.visitDate || ''));
                    break;
                case 'pool-asc':
                    sorted.sort((a, b) => (a.visitPoolId || '').localeCompare(b.visitPoolId || ''));
                    break;
                case 'status':
                    let order = { draft: 0, complete: 1, uploaded: 2, server: 3 };
                    sorted.sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));
                    break;
                default:
                    sorted.sort((a, b) => (b.visitDate || '').localeCompare(a.visitDate || ''));
            }
            return sorted;
        }
    </script>
</body>
</html>
