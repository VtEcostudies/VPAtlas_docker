<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPAtlas - Reset Password</title>
    <link rel="stylesheet" href="/css/bootstrap_5.2.3.min.css">
    <link rel="stylesheet" href="/css/font-awesome_6.6.0.all.min.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>
    <div class="container-fluid" style="height: 100%; min-height: 100vh;">
        <div class="row">
            <div class="col-lg-6 offset-lg-3 col-12">
                <header>
                    <div class="row controls">
                        <div class="col-12 header-title-info">
                            <h2 class="header-title light-foreground">VPAtlas Password Reset</h2>
                        </div>
                    </div>
                </header>
                <hr class="divider-header">

                <div id="message" class="auth-message"></div>

                <form id="reset_form" onsubmit="return false;">
                    <div class="row">
                        <div class="col-lg-12">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required style="width:100%">
                        </div>
                    </div>

                    <div class="button-container">
                        <button type="button" onclick="window.location.href='/explore/login.html'">Cancel</button>
                        <button type="submit" class="default-button">Send Reset Link</button>
                    </div>
                </form>

                <hr>
                <div class="auth-links">
                    <a href="./login.html">Back to Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/bootstrap_5.2.3.min.js"></script>
    <script type="module">
        import { resetUserPassword } from './js/auth.js';

        const form = document.getElementById('reset_form');
        const message = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            message.textContent = 'Sending reset link...';
            message.className = 'auth-message info';

            try {
                let email = document.getElementById('email').value;
                let res = await resetUserPassword({ email });
                message.textContent = 'Reset link sent! Check your email.';
                message.className = 'auth-message success';
            } catch(err) {
                message.textContent = err.message || 'Reset request failed.';
                message.className = 'auth-message error';
            }
        });
    </script>
</body>
</html>
