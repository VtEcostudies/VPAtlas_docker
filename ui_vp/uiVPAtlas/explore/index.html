<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPAtlas - Vernal Pool Atlas</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2c5530">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/bootstrap_5.2.3.min.css">
    <link rel="stylesheet" href="/css/font-awesome_6.6.0.all.min.css">
    <link rel="stylesheet" href="/css/leaflet_1.9.4.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/modal.css">
    <link rel="stylesheet" href="./css/pool_list.css">
    <link rel="stylesheet" href="./css/filter_bar.css">
    <link rel="stylesheet" href="/css/map.css">
    <link rel="stylesheet" href="/survey/css/visit_queue.css">
</head>
<body>
    <header>
        <!-- Row 1: Logo + hamburger + profile (always visible) -->
        <div class="explore-row1">
            <span class="header-logo-link">
                <a href="https://val.vtecostudies.org/projects/vermont-vernal-pool-atlas/" target="_blank" rel="noopener" title="Vermont Center for Ecostudies — Vernal Pool Atlas">
                    <img src="/images/vce_logo_no_tagline.png" alt="VCE" class="header-vce-logo">
                    <img src="/images/vce_logo_abbrev.png" alt="" class="header-vce-icon" aria-hidden="true">
                    <span class="header-vce-text" aria-hidden="true">VCE</span>
                </a>
                <a id="logo_link" href="/explore/" class="header-app-stack" style="text-decoration:none;">
                    <span class="header-name light-foreground header-app-name">VPAtlas</span>
                    <span id="app_version" class="app-version"></span>
                </a>
            </span>

            <!-- Desktop: filters inline here -->
            <div id="filter_container" class="filter-container"></div>

            <!-- Right group: filter toggle + hamburger + profile -->
            <div class="explore-row1-right">
                <button class="filter-toggle-btn" id="filter_toggle_btn" style="display:none;" title="Show/hide filters"><i class="fa fa-sliders"></i></button>
                <div style="position:relative;">
                    <button class="action-overflow-btn" id="app_menu_btn" style="display:block;"><i class="fa fa-bars"></i></button>
                    <div class="action-overflow-panel" id="app_menu_panel" style="right:0; min-width:200px;"></div>
                </div>
                <div id="profile_container" class="profile-container"></div>
            </div>
        </div>

        <!-- Row 2: Filters (mobile: always visible row; desktop: hidden, inline in row 1) -->
        <div id="filter_container_mobile" class="explore-row2"></div>

        <!-- Row 3: Status chips + level chips + active filter tokens -->
        <div class="explore-row3">
            <div id="filter_description" class="filter-description"></div>
            <div id="filter_tokens_row" class="filter-description"></div>
        </div>
    </header>

    <hr class="divider-header">

    <!-- Three-pane content layout -->
    <div class="content-row" id="content_row">
        <!-- Left pane: Pool list -->
        <div class="tri-pane tri-pane-left" id="pane_left">
            <div id="list_table_title"></div>
            <div id="list_table" style="overflow-y:auto; flex:1;"></div>
        </div>

        <!-- Divider -->
        <div class="pane-divider" id="divider_left"></div>

        <!-- Center pane: Map -->
        <div class="tri-pane tri-pane-center" id="pane_center" style="position:relative;">
            <div id="map" style="height:100%; width:100%; border-radius:var(--border-radius);"></div>
            <!-- Zoom toolbar — same pattern as Pool Finder -->
            <div class="pf-zoom-bar">
                <button class="pf-zoom-btn" id="map_zoom_btn" title="Zoom to filtered pools">
                    <i class="fa fa-crosshairs"></i><i class="fa fa-tint" aria-hidden="true"></i>
                </button>
                <button class="pf-zoom-btn" id="map_gps_btn" title="Zoom to my location">
                    <i class="fa fa-crosshairs"></i><i class="fa fa-user" aria-hidden="true"></i>
                </button>
                <button class="pf-zoom-btn" id="map_both_btn" title="Zoom to pools and my location" style="display:none;">
                    <i class="fa fa-crosshairs"></i><span class="zoom-both-icons" aria-hidden="true"><i class="fa fa-tint"></i><i class="fa fa-user"></i></span>
                </button>
            </div>
        </div>

        <!-- Divider -->
        <div class="pane-divider" id="divider_right"></div>

        <!-- Right pane: Summary -->
        <div class="tri-pane tri-pane-right" id="pane_right">
            <div id="summary_title"></div>
            <div id="pool_summary" style="overflow-y:auto; flex:1;"></div>
        </div>
    </div>

    <!-- Mobile tab bar (hidden on desktop via CSS) -->
    <div class="explore-tabs" id="explore_tabs">
        <button class="explore-tab-btn active" data-tab="list"><i class="fa fa-list"></i>List</button>
        <button class="explore-tab-btn" data-tab="map"><i class="fa fa-map"></i>Map</button>
        <button class="explore-tab-btn" data-tab="info"><i class="fa fa-info-circle"></i>Info</button>
    </div>

    <!-- Core libraries (non-module) -->
    <script src="/js/console_manager.js"></script>
    <script src="/js/resource_manager.js"></script>
    <script src="/js/bootstrap_5.2.3.min.js"></script>
    <script src="/js/leaflet_1.9.4.js"></script>

    <!-- Config (non-module, must load before modules) -->
    <script src="/js/config.js"></script>
    <script src="/js/esri-leaflet_3.0.12.js"></script>

    <!-- App modules -->
    <script type="module" src="./js/pool_list.js"></script>
    <script type="module" src="./js/map.js"></script>
    <script type="module" src="./js/filter_bar.js"></script>
    <script type="module" src="./js/pool_summary.js"></script>

    <!-- Toast messaging (non-module) -->
    <script src="/js/app_messaging.js"></script>

    <!-- Main app entry point -->
    <script type="module">
        import { initPoolList, loadPools, refreshPools, renderFilteredRows, clearFocus, getFocusedPoolId, setFocusedPoolId } from './js/pool_list.js';
        import { initMap, plotPoolRows, zoomToPool, zoomToState, zoomToFilteredPools, getMap, getMapFilters, setStatusVisible, setLevelVisible, wireGpsButton, wireBothButton } from './js/map.js';
        import { initFilterBar } from './js/filter_bar.js';
        import { initSummary, showPoolSummary, showScopeSummary } from './js/pool_summary.js';
        import { showWait, hideWait } from './js/utils.js';
        import { loadFromUrl, loadFromStorage, setPopState, filters, buildSearchTerm, filterRowsByDataType, putUserState } from './js/url_state.js';
        import { getPoolColor } from '/js/map_common.js';
        import { getUser, logout } from '/js/auth.js';
        import { showModal } from './js/modal.js';
        import { setupProfileIcon } from '/js/profile_icon.js';
        import { getLocalVisitCount } from '/survey/js/visit_queue_ui.js';
        import { getLocal, setLocal } from '/js/storage.js';

        // Track this as the last-visited path for /js/home_button.js.
        try { sessionStorage.setItem('lastPath', '/explore/'); } catch (_) {}

        // Master pool dataset — loaded once, filtered client-side
        var masterRows = [];
        var currentUser = null;

        // Load version from manifest
        fetch('/manifest.json').then(r => r.json()).then(m => {
            let el = document.getElementById('app_version');
            if (el && m.version) el.textContent = 'v' + m.version;
        }).catch(() => {});

        // Initialize on DOM ready
        window.initApp = async function() {
            console.log('VPAtlas explore: initApp()');

            // Load filters: URL params take priority; if none, restore from IndexedDB
            let urlFilters = loadFromUrl();
            let hasUrlParams = window.location.search.length > 1;
            if (!hasUrlParams) {
                await loadFromStorage();
            }

            // Initialize components
            let user = await getUser();
            currentUser = user;
            let currentUsername = user ? (user.handle || user.username || user.email) : null;
            initPoolList('list_table', 'list_table_title', onPoolSelect, currentUsername, zoomToFilteredPools, onPoolDeselect);
            initSummary('pool_summary', 'summary_title');
            await initMap({ isAdmin: user && user.userrole === 'admin' });
            initFilterBar(onFilterChange);

            // Setup profile icon + app menu
            setupProfileIcon('profile_container');
            setupAppMenu(user);

            // Load pool data (instant from cache, or fetch if no cache).
            // All filtering is client-side after this point.
            masterRows = await loadPools(onDataRefresh);
            refreshUI();

            // Wire map zoom buttons
            document.getElementById('map_zoom_btn').addEventListener('click', zoomToFilteredPools);
            wireGpsButton(document.getElementById('map_gps_btn'));
            wireBothButton(document.getElementById('map_both_btn'));

            // Map layer toggles → re-filter list + summary (map already updated its own markers)
            document.addEventListener('map:layer-filter', () => {
                withWait(() => {
                    let poolRows = applyClientFilters(masterRows);
                    let visibleRows = applyMapVisibility(poolRows);
                    renderFilteredRows(visibleRows);
                    showScopeSummary(visibleRows);
                    renderStatusChips();
                });
            });

            // Mobile: clone filter bar contents into row 2
            populateMobileFilters();

            // Handle browser back/forward
            setPopState(onFilterChange);
        };

        // =================================================================
        // Mobile tab switching
        // =================================================================
        const mobileQuery = window.matchMedia('(max-width: 1150px)');

        function switchTab(tabName) {
            let contentRow = document.getElementById('content_row');
            if (!contentRow) return;
            contentRow.dataset.activeTab = tabName;
            document.querySelectorAll('.explore-tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });
            if (tabName === 'map') {
                let m = getMap();
                if (m) setTimeout(() => { m.invalidateSize(); zoomToFilteredPools(); }, 100);
            }
        }

        function switchToInfoIfMobile() {
            if (mobileQuery.matches) switchTab('info');
        }

        // Wire tab buttons
        document.querySelectorAll('.explore-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        // Handle crossing the breakpoint
        mobileQuery.addEventListener('change', (e) => {
            let contentRow = document.getElementById('content_row');
            if (!contentRow) return;
            if (e.matches) {
                if (!contentRow.dataset.activeTab) contentRow.dataset.activeTab = 'list';
            } else {
                delete contentRow.dataset.activeTab;
            }
            let m = getMap();
            if (m) setTimeout(() => m.invalidateSize(), 150);
        });

        // Set initial mobile state
        if (mobileQuery.matches) {
            let cr = document.getElementById('content_row');
            if (cr) cr.dataset.activeTab = 'list';
        }

        // =================================================================
        // Pool selection callbacks
        // =================================================================
        function onPoolSelect(poolId) {
            showPoolSummary(poolId, onPoolDeselect);
            zoomToPool(poolId);
            switchToInfoIfMobile();
        }

        function onPoolDeselect() {
            clearFocus();
            let poolRows = applyClientFilters(masterRows);
            let visibleRows = applyMapVisibility(poolRows);
            showScopeSummary(visibleRows);
            zoomToFilteredPools();
        }

        function onMapPoolClick(props) {
            let poolId = props.mappedPoolId || props.poolId;
            if (!poolId) return;
            // Toggle: if already focused, deselect
            if (getFocusedPoolId() === poolId) {
                onPoolDeselect();
                return;
            }
            showPoolSummary(poolId, onPoolDeselect);
            setFocusedPoolId(poolId);
            switchToInfoIfMobile();
        }

        // Run heavy synchronous work with the wait overlay visible.
        // Double-rAF guarantees the overlay paints BEFORE the work runs.
        // A depth counter keeps the overlay solid across nested calls
        // (e.g. chip click → setStatusVisible → map:layer-filter listener),
        // so the user sees one continuous spinner instead of on/off/on flicker.
        let waitDepth = 0;
        function withWait(fn) {
            waitDepth++;
            showWait();
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    try { fn(); }
                    finally {
                        waitDepth = Math.max(0, waitDepth - 1);
                        if (waitDepth === 0) hideWait();
                    }
                });
            });
        }

        // Optimistic chip style — apply BEFORE the slow work so the user
        // sees the chip toggle state instantly.
        function setStatusChipActive(chip, status, active) {
            let color = getPoolColor(status);
            if (active) {
                chip.style.cssText += `background:${color};color:white;border-color:${color};opacity:1;`;
            } else {
                chip.style.cssText += `background:transparent;color:#999;border-color:#ccc;opacity:0.5;`;
            }
        }
        function setLevelChipActive(chip, active) {
            if (active) {
                chip.style.cssText += `background:var(--primary-light);color:var(--primary-color);border-color:var(--primary-color);opacity:1;`;
            } else {
                chip.style.cssText += `background:transparent;color:#999;border-color:#ccc;opacity:0.5;`;
            }
        }

        // Render all three panes from masterRows through all filters.
        function refreshUI() {
            withWait(() => {
                let poolRows = applyClientFilters(masterRows);
                plotPoolRows(poolRows, onMapPoolClick);       // map creates ALL markers, handles status/level visibility internally
                let visibleRows = applyMapVisibility(poolRows);
                renderFilteredRows(visibleRows);
                showScopeSummary(visibleRows);
                renderStatusChips();
                zoomToFilteredPools();
            });
        }

        // Called when top-bar filters change — filter cached data, no DB reload
        function onFilterChange(updatedFilters) {
            refreshUI();
        }

        // Called if background freshness check finds stale data and re-fetches
        function onDataRefresh(newRows) {
            console.log('explore: data refreshed from DB, updating UI');
            masterRows = newRows;
            refreshUI();
        }

        // True if a pool row has any obligate vernal-pool indicator species reported,
        // either in an Atlas Visit (vpvisit columns) or in a Monitoring Survey
        // (vpsurvey.surveyAmphibJson, keyed by observer 1/2).
        function rowHasIndicator(r) {
            // Visit-level columns
            if (r.visitWoodFrogEgg > 0 || r.visitWoodFrogAdults > 0 || r.visitWoodFrogLarvae > 0 ||
                r.visitSpsEgg > 0 || r.visitSpsAdults > 0 || r.visitSpsLarvae > 0 ||
                r.visitJesaEgg > 0 || r.visitJesaAdults > 0 || r.visitJesaLarvae > 0 ||
                r.visitBssaEgg > 0 || r.visitBssaAdults > 0 || r.visitBssaLarvae > 0 ||
                r.visitFairyShrimp > 0) return true;
            // Survey amphib JSON (observer 1 + 2, edge + interior)
            let aj = r.surveyAmphibJson;
            if (typeof aj === 'string') { try { aj = JSON.parse(aj); } catch(e) { aj = null; } }
            if (aj && typeof aj === 'object') {
                let keys = ['surveyAmphibEdgeWOFR','surveyAmphibEdgeSPSA','surveyAmphibEdgeJESA','surveyAmphibEdgeBLSA',
                            'surveyAmphibInteriorWOFR','surveyAmphibInteriorSPSA','surveyAmphibInteriorJESA','surveyAmphibInteriorBLSA'];
                for (let obs of ['1', '2']) {
                    let o = aj[obs];
                    if (!o) continue;
                    for (let k of keys) {
                        if (Number(o[k]) > 0) return true;
                    }
                }
            }
            return false;
        }

        // Apply all client-side filters (pool ID, town, county, data type, indicator species)
        // NOTE: map layer visibility (status/level checkboxes) is NOT applied here —
        // plotPoolRows() handles marker visibility internally, and list/summary use applyMapVisibility().
        function applyClientFilters(rows) {
            let filtered = rows;

            // Pool ID partial match
            if (filters.poolIdSearch) {
                let term = filters.poolIdSearch.toLowerCase();
                filtered = filtered.filter(r => {
                    let id = (r.poolId || r.mappedPoolId || '').toLowerCase();
                    return id.includes(term);
                });
            }

            // Town filter
            if (filters.townNames.length) {
                let towns = filters.townNames.map(t => t.toLowerCase());
                filtered = filtered.filter(r => {
                    let t = (r.townName || '').toLowerCase();
                    return towns.includes(t);
                });
            }

            // County filter
            if (filters.countyNames.length) {
                let counties = filters.countyNames.map(c => c.toUpperCase());
                filtered = filtered.filter(r => {
                    let c = (r.countyName || '').toUpperCase();
                    return counties.includes(c);
                });
            }

            // Indicator species filter — check both visit columns and monitoring survey JSON
            if (filters.hasIndicator) {
                filtered = filtered.filter(rowHasIndicator);
            }

            // "Near me" radius filter — keep rows within nearMeKm km of nearMeOrigin
            if (filters.nearMeKm > 0 && filters.nearMeOrigin) {
                let { lat: oLat, lng: oLng } = filters.nearMeOrigin;
                let radiusM = filters.nearMeKm * 1000;
                filtered = filtered.filter(r => {
                    let lat = parseFloat(r.latitude ?? r.mappedLatitude);
                    let lng = parseFloat(r.longitude ?? r.mappedLongitude);
                    if (!Number.isFinite(lat) || !Number.isFinite(lng)) return false;
                    return haversineMeters(oLat, oLng, lat, lng) <= radiusM;
                });
            }

            // Data type (Mine, Review)
            filtered = filterRowsByDataType(filtered, currentUser);

            return filtered;
        }

        // Great-circle distance in meters. Used by the "Near me" filter.
        function haversineMeters(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const toRad = (d) => d * Math.PI / 180;
            let dLat = toRad(lat2 - lat1);
            let dLng = toRad(lng2 - lng1);
            let a = Math.sin(dLat / 2) ** 2 +
                    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
            return 2 * R * Math.asin(Math.sqrt(a));
        }

        // Apply map layer visibility (status + survey level) for list/summary rendering
        function applyMapVisibility(rows) {
            let mf = getMapFilters();
            return rows.filter(r => {
                let status = r.poolStatus || r.mappedPoolStatus || '';
                let level = r.surveyId ? 'monitored' : r.visitId ? 'visited' : 'potential';
                return mf.statusVisible[status] !== false && mf.levelVisible[level] !== false;
            });
        }



        // =================================================================
        // Status chips — show active pool statuses in filter header area
        // Visible on mobile list/info tabs where the map legend isn't visible
        // =================================================================
        const ALL_STATUS_NAMES = ['Potential', 'Probable', 'Confirmed', 'Duplicate', 'Eliminated'];
        const ADMIN_ONLY = ['Duplicate', 'Eliminated'];
        const LEVEL_CHIPS = [
            { key: 'potential',  label: 'Mapped',    shape: '<svg width="10" height="10" style="vertical-align:-1px;"><circle cx="5" cy="5" r="4" fill="CCC" stroke="#333" stroke-width="0.8"/></svg>' },
            { key: 'visited',   label: 'Visited',   shape: '<svg width="10" height="10" style="vertical-align:-1px;"><polygon points="5,1 9,9 1,9" fill="#ccc" stroke="#333" stroke-width="0.8"/></svg>' },
            { key: 'monitored', label: 'Monitored', shape: '<svg width="10" height="10" style="vertical-align:-1px;"><polygon points="5,1 9,5 5,9 1,5" fill="#ccc" stroke="#333" stroke-width="0.8"/></svg>' }
        ];

        function renderStatusChips() {
            let container = document.getElementById('filter_description');
            if (!container) return;
            let mf = getMapFilters();
            let userIsAdmin = currentUser && currentUser.userrole === 'admin';
            let chipStatuses = userIsAdmin ? ALL_STATUS_NAMES : ALL_STATUS_NAMES.filter(s => !ADMIN_ONLY.includes(s));

            // Status chips — sized to match .filter-token (county/town chips)
            let html = chipStatuses.map(status => {
                let active = mf.statusVisible[status] !== false;
                let color = getPoolColor(status);
                let style = active
                    ? `background:${color}; color:white; border-color:${color}; opacity:1;`
                    : `background:transparent; color:#999; border-color:#ccc; opacity:0.5;`;
                return `<span class="status-chip" data-status="${status}"
                    style="display:inline-block; padding:2px 8px; border-radius:12px;
                    font-size:13px; font-weight:600; cursor:pointer; border:1px solid; ${style}">${status}</span>`;
            }).join('');



            // Level chips — sized to match .filter-token
            html += LEVEL_CHIPS.map(lev => {
                let active = mf.levelVisible[lev.key] !== false;
                let style = active
                    ? `background:var(--primary-light); color:var(--primary-color); border-color:var(--primary-color); opacity:1;`
                    : `background:transparent; color:#999; border-color:#ccc; opacity:0.5;`;
                return `<span class="level-chip" data-level="${lev.key}"
                    style="display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:12px;
                    font-size:13px; font-weight:600; cursor:pointer; border:1px solid; ${style}">${lev.shape} ${lev.label}</span>`;
            }).join('');

            container.innerHTML = html;

            // Wire status chip clicks
            container.querySelectorAll('.status-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    let status = chip.dataset.status;
                    let mf = getMapFilters();
                    let nowVisible = !(mf.statusVisible[status] !== false);
                    setStatusChipActive(chip, status, nowVisible);  // instant visual feedback
                    withWait(() => setStatusVisible(status, nowVisible));
                });
            });

            // Wire level chip clicks
            container.querySelectorAll('.level-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    let level = chip.dataset.level;
                    let mf = getMapFilters();
                    let nowVisible = !(mf.levelVisible[level] !== false);
                    setLevelChipActive(chip, nowVisible);  // instant visual feedback
                    withWait(() => setLevelVisible(level, nowVisible));
                });
            });
        }

        // =================================================================
        // Mobile: dynamic header height + filter toggle
        // =================================================================
        function measureHeader() {
            let header = document.querySelector('header');
            let divider = document.querySelector('.divider-header');
            if (!header) return;
            let h = header.offsetHeight + (divider ? divider.offsetHeight : 0);
            document.documentElement.style.setProperty('--header-h', h + 'px');
            // Invalidate map after height change
            let m = getMap();
            if (m) setTimeout(() => m.invalidateSize(), 50);
        }

        // Observe header size changes (filter tokens wrapping, etc.)
        if (typeof ResizeObserver !== 'undefined') {
            let headerEl = document.querySelector('header');
            if (headerEl) {
                new ResizeObserver(measureHeader).observe(headerEl);
            }
        }

        // Filter toggle button (mobile only) — persisted in map_settings
        (async function() {
            let btn = document.getElementById('filter_toggle_btn');
            let row2 = document.getElementById('filter_container_mobile');
            if (!btn || !row2) return;

            // Restore saved state
            let mapSettings = await getLocal('map_settings') || {};
            let filtersCollapsed = !!mapSettings.filtersCollapsed;

            function syncToggle() {
                if (mobileQuery.matches) {
                    btn.style.display = 'flex';
                    if (filtersCollapsed) {
                        row2.classList.add('collapsed');
                        btn.classList.remove('active');
                    } else {
                        row2.classList.remove('collapsed');
                        btn.classList.add('active');
                    }
                    measureHeader();
                } else {
                    btn.style.display = 'none';
                    row2.classList.remove('collapsed');
                }
            }

            btn.addEventListener('click', async () => {
                filtersCollapsed = !filtersCollapsed;
                row2.classList.toggle('collapsed', filtersCollapsed);
                btn.classList.toggle('active', !filtersCollapsed);
                measureHeader();
                let s = await getLocal('map_settings') || {};
                s.filtersCollapsed = filtersCollapsed;
                await setLocal('map_settings', s);
            });

            mobileQuery.addEventListener('change', syncToggle);
            syncToggle();
        })();

        // Mobile: move filter bar into row 2 so it's always visible
        function populateMobileFilters() {
            let mobileRow = document.getElementById('filter_container_mobile');
            let desktopBar = document.getElementById('filter-bar');
            if (!mobileRow || !desktopBar) return;

            // On mobile, move the filter bar DOM node into row 2
            // On desktop, move it back into filter_container
            function syncFilterLocation() {
                if (window.matchMedia('(max-width: 1150px)').matches) {
                    if (desktopBar.parentElement !== mobileRow) mobileRow.appendChild(desktopBar);
                } else {
                    let fc = document.getElementById('filter_container');
                    if (fc && desktopBar.parentElement !== fc) fc.appendChild(desktopBar);
                }
            }
            syncFilterLocation();
            window.matchMedia('(max-width: 1150px)').addEventListener('change', syncFilterLocation);
        }

        // App hamburger menu — navigation + admin links
        async function setupAppMenu(user) {
            let btn = document.getElementById('app_menu_btn');
            let panel = document.getElementById('app_menu_panel');
            if (!btn || !panel) return;

            let items = [];
            if (user) {
                let counts = await getLocalVisitCount();
                let badge = counts.total ? ` (${counts.total})` : '';
                items.push({ label: `My Visits and Tracks${badge}`, href: '/explore/visit_list.html', icon: 'fa-inbox' });
                items.push({ divider: true });
            }
            items.push({ label: 'Refresh Pool Data', icon: 'fa-rotate', action: async () => {
                let fresh = await refreshPools();
                if (fresh && fresh.length) { masterRows = fresh; refreshUI(); }
            }});
            items.push({ divider: true });
            items.push(
                { label: 'Changelog', href: '/docs/', icon: 'fa-clipboard-list' },
                { label: 'System Info', href: '/explore/system.html', icon: 'fa-circle-info' },
                { label: 'About VPAtlas', href: 'https://val.vtecostudies.org/projects/vermont-vernal-pool-atlas/', icon: 'fa-info-circle', external: true },
                { label: 'Volunteer How To', href: 'https://val.vtecostudies.org/projects/vermont-vernal-pool-atlas/help-us-find-and-map-vernal-pools/', icon: 'fa-book', external: true },
            );
            if (user && user.userrole === 'admin') {
                items.push({ divider: true });
                items.push({ label: 'Users', href: '/admin/users_admin.html', icon: 'fa-users-cog' });
                items.push({ label: 'Import S123 Atlas Visits', href: '/admin/s123_visit_import.html', icon: 'fa-file-import' });
                items.push({ label: 'Import S123 Monitoring Surveys', href: '/admin/s123_survey_import.html', icon: 'fa-file-import' });
            }

            items.forEach(item => {
                if (item.divider) {
                    let hr = document.createElement('hr');
                    hr.style.cssText = 'margin:4px 0; border-color:#eee;';
                    panel.appendChild(hr);
                    return;
                }
                let el = document.createElement('button');
                el.className = 'action-button';
                el.innerHTML = `<i class="fa ${item.icon}" style="width:20px;"></i> ${item.label}`;
                el.addEventListener('click', () => {
                    panel.classList.remove('show');
                    if (item.action) item.action();
                    else if (item.external) window.open(item.href, '_blank');
                    else if (item.href) window.location.href = item.href;
                });
                panel.appendChild(el);
            });

            btn.addEventListener('click', (e) => { e.stopPropagation(); panel.classList.toggle('show'); });
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#app_menu_panel') && !e.target.closest('#app_menu_btn'))
                    panel.classList.remove('show');
            });
        }

        // If SW is disabled or app.js isn't loaded, init directly
        if (typeof appConfig !== 'undefined' && appConfig.useServiceWorker === false) {
            document.addEventListener('DOMContentLoaded', () => window.initApp());
        }
    </script>

    <!-- Resizable pane dividers (desktop only) -->
    <script type="module">
        import { getLocal, setLocal } from '/js/storage.js';
        import { getMap } from './js/map.js';

        const STORAGE_KEY = 'paneSizes';
        const DEFAULT_SIZES = [33.33, 33.34, 33.33]; // left, center, right %
        const MIN_PCT = 15; // minimum pane width %

        const row = document.getElementById('content_row');
        const panes = [
            document.getElementById('pane_left'),
            document.getElementById('pane_center'),
            document.getElementById('pane_right')
        ];
        const dividers = [
            document.getElementById('divider_left'),
            document.getElementById('divider_right')
        ];

        function isDesktop() {
            return window.matchMedia('(min-width: 1151px)').matches;
        }

        function applyPaneSizes(sizes) {
            if (!isDesktop()) return;
            panes[0].style.flex = `0 0 ${sizes[0]}%`;
            panes[1].style.flex = `0 0 ${sizes[1]}%`;
            panes[2].style.flex = `0 0 ${sizes[2]}%`;
        }

        async function loadSizes() {
            let sizes = await getLocal(STORAGE_KEY);
            if (!sizes || !Array.isArray(sizes) || sizes.length !== 3) sizes = [...DEFAULT_SIZES];
            applyPaneSizes(sizes);
            return sizes;
        }

        let currentSizes = [...DEFAULT_SIZES];
        loadSizes().then(s => { currentSizes = s; });

        // Reset to flex defaults on mobile
        window.matchMedia('(min-width: 1151px)').addEventListener('change', (e) => {
            if (e.matches) {
                applyPaneSizes(currentSizes);
            } else {
                panes.forEach(p => p.style.flex = '');
            }
        });

        // Drag logic
        dividers.forEach((div, idx) => {
            function onPointerDown(e) {
                if (!isDesktop()) return;
                e.preventDefault();
                let startX = e.clientX || (e.touches && e.touches[0].clientX);
                let rowWidth = row.getBoundingClientRect().width;

                // Overlay to prevent map/iframe stealing events
                let overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;cursor:col-resize;';
                document.body.appendChild(overlay);

                function onMove(e2) {
                    let clientX = e2.clientX || (e2.touches && e2.touches[0].clientX);
                    let dx = clientX - startX;
                    let dPct = (dx / rowWidth) * 100;

                    let newSizes = [...currentSizes];
                    // idx 0: between left and center, idx 1: between center and right
                    newSizes[idx] += dPct;
                    newSizes[idx + 1] -= dPct;

                    // Enforce minimums
                    if (newSizes[idx] < MIN_PCT || newSizes[idx + 1] < MIN_PCT) return;

                    currentSizes = newSizes;
                    startX = clientX;
                    applyPaneSizes(currentSizes);

                    // Invalidate Leaflet map
                    let map = getMap();
                    if (map) map.invalidateSize();
                }

                function onUp() {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    document.removeEventListener('touchmove', onMove);
                    document.removeEventListener('touchend', onUp);
                    overlay.remove();
                    setLocal(STORAGE_KEY, currentSizes);
                }

                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('touchend', onUp);
            }

            div.addEventListener('mousedown', onPointerDown);
            div.addEventListener('touchstart', onPointerDown, { passive: false });
        });

        // Double-click divider to reset to equal thirds
        dividers.forEach(div => {
            div.addEventListener('dblclick', async () => {
                currentSizes = [...DEFAULT_SIZES];
                applyPaneSizes(currentSizes);
                await setLocal(STORAGE_KEY, currentSizes);
                let map = getMap();
                if (map) map.invalidateSize();
            });
        });
    </script>

    <!-- Service worker handler (non-module, calls initApp) -->
    <script src="/js/bandwidth_monitor.js"></script>
    <script src="/js/app.js"></script>
</body>
