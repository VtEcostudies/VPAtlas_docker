<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPAtlas - Sign In</title>
    <link rel="stylesheet" href="/css/bootstrap_5.2.3.min.css">
    <link rel="stylesheet" href="/css/font-awesome_6.6.0.all.min.css">
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>
    <div class="container-fluid" style="height: 100%; min-height: 100vh;">
        <div class="row">
            <div class="col-lg-6 offset-lg-3 col-12">
                <header>
                    <div class="row controls">
                        <div class="col-12 header-title-info">
                            <h2 class="header-title light-foreground">VPAtlas Sign In</h2>
                        </div>
                    </div>
                </header>
                <hr class="divider-header">

                <div id="message" class="auth-message"></div>

                <form id="login_form" onsubmit="return false;">
                    <div class="row">
                        <div class="col-lg-12">
                            <label for="username">Username or Email</label>
                            <input type="text" id="username" name="username" required style="width:100%"
                                autocapitalize="none" autocorrect="off" spellcheck="false" autocomplete="username">
                        </div>
                    </div>
                    <div class="row" style="margin-top:10px;">
                        <div class="col-lg-12">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required style="width:100%">
                        </div>
                    </div>

                    <div class="button-container">
                        <button id="btn_cancel" type="button" onclick="window.location.href='/explore/'">Cancel</button>
                        <button id="btn_login" type="submit" class="default-button">Sign In</button>
                    </div>
                </form>

                <hr>
                <div class="auth-links">
                    <a href="./register.html">Create an Account</a>
                    <a href="./reset.html">Forgot Password?</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/config.js"></script>
    <script src="/js/bootstrap_5.2.3.min.js"></script>
    <script type="module">
        import { login } from '/js/auth.js';

        const form = document.getElementById('login_form');
        const message = document.getElementById('message');
        const params = new URLSearchParams(window.location.search);
        const confirmToken = params.get('token');

        if (confirmToken) {
            message.textContent = 'Welcome — sign in to complete your VPAtlas registration.';
            message.className = 'auth-message info';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            message.textContent = 'Signing in...';
            message.className = 'auth-message info';

            try {
                let username = document.getElementById('username').value;
                let password = document.getElementById('password').value;
                let res = await login(username, password, confirmToken);

                message.textContent = 'Success! Redirecting...';
                message.className = 'auth-message success';

                let returnUrl = params.get('returnUrl') || '/explore/';
                setTimeout(() => window.location.href = decodeURIComponent(returnUrl), 500);
            } catch(err) {
                message.textContent = err.message || 'Login failed. Check your credentials.';
                message.className = 'auth-message error';
            }
        });
    </script>
</body>
</html>
