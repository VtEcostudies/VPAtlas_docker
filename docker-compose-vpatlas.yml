#
# VPAtlas Docker Compose
#
# Port Scheme:
#   db=6550, api=4010, ui=8090
#

services:
  db_vp:
    container_name: db_vp
    image: db_vp
    build:
      context: ./db_vp
      dockerfile: Dockerfile
    volumes:
      - ./db_data_vp:/var/lib/postgresql/data
    environment:
      - POSTGRES_HOST=db_vp
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=vpatlas
    ports:
      - 6550:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vpatlas"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # One-shot migration runner - runs after db is healthy, before api starts.
  # Uses the same db image (has psql + PostGIS), mounts migration SQL files.
  # Exits 0 when done - does not stay running.
  db_migrate_vp:
    container_name: db_migrate_vp
    image: db_vp
    volumes:
      - ./db_migrate:/db_migrate:ro
    entrypoint: ["/bin/bash", "/db_migrate/migrate_internal.sh"]
    environment:
      - PGHOST=db_vp
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=vpatlas
      - MIGRATIONS_DIR=/db_migrate/migrations
    depends_on:
      db_vp:
        condition: service_healthy
    restart: "no"

  api_vp:
    container_name: api_vp
    image: api_vp
    build:
      context: ./api_vp
      dockerfile: Dockerfile
    volumes:
      - ./photo_data:/opt/api/photos
    environment:
      NODE_ENV: env-local

      # API connection to DB (internal Docker network)
      DB_HOST: db_vp
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: vpatlas

      # API server config
      API_PROT: http
      API_HOST: localhost
      API_PORT: 4010

      # UI host config (external to Docker)
      UI_PROT: https
      UI_HOST: vpatlas.org
      UI_PORT: 80
    ports:
      - 4010:4010
    depends_on:
      db_vp:
        condition: service_healthy
      db_migrate_vp:
        condition: service_completed_successfully

  ui_vp:
    container_name: ui_vp
    image: ui_vp
    build:
      context: ./ui_vp
      dockerfile: Dockerfile
    environment:
      # API connection (external to Docker)
      API_PROT: https
      API_HOST: api.vpatlas.org
      API_PORT: 4010

      # UI server config (external to Docker)
      UI_PROT: https
      UI_HOST: vpatlas.org
      UI_PORT: 8090
    ports:
      - 8090:8090
    depends_on:
      - api_vp
